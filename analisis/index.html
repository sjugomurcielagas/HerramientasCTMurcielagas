<!DOCTYPE html>
<html lang="es-AR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Analisis - Las Murcielagas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800&family=Barlow+Condensed:wght@500;600;700&display=swap" rel="stylesheet">
  <script>(function(){var a=localStorage.getItem('mrcl_auth'),ts=Number(localStorage.getItem('mrcl_auth_ts')||0);if(a!=='1'||!ts||(Date.now()-ts)>=30*24*60*60*1000){localStorage.removeItem('mrcl_auth');localStorage.removeItem('mrcl_auth_ts');location.replace('../index.html');}})();</script>
  <style>
    :root{--azul-950:#06172f;--azul-800:#0b2f5f;--celeste:#22a8e8;--celeste-100:#e7f6fd;--fondo:#f4f9fd;--card:#fff;--borde:#dbe7ef;--texto:#102033;--muted:#64748b;--shadow:0 14px 35px rgba(6,23,47,.12);--radius:18px}
    *{box-sizing:border-box}body{margin:0;font-family:"Barlow",system-ui,sans-serif;background:linear-gradient(180deg,#f8fcff 0%,var(--fondo) 100%);color:var(--texto)}
    .topbar{position:sticky;top:0;background:rgba(255,255,255,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--borde)}
    .topbar-inner{max-width:1180px;margin:0 auto;padding:12px 14px;display:flex;gap:12px;align-items:center}
    .home-link{text-decoration:none;color:var(--azul-800);background:var(--celeste-100);padding:9px 12px;border-radius:999px;font-weight:800;font-size:.9rem}
    .brand{display:flex;align-items:center;gap:9px;min-width:0;flex:1}.brand img{height:40px;background:#fff;border-radius:14px;padding:4px}
    .brand-title{font-family:"Barlow Condensed",sans-serif;font-size:clamp(1.35rem,4vw,2.05rem);font-weight:700;color:var(--azul-950)}
    main{max-width:1180px;margin:0 auto;padding:24px 14px 60px}
    .intro h1{font-family:"Barlow Condensed",sans-serif;font-size:clamp(2rem,5vw,3rem);line-height:1;margin:0 0 7px}
    .intro p{color:var(--muted);margin:0 0 18px}
    .grid{display:grid;gap:14px;grid-template-columns:1fr}
    .tool-card{background:var(--card);border:1px solid var(--borde);border-radius:var(--radius);box-shadow:var(--shadow);padding:22px 24px;text-decoration:none;color:inherit}
    .tool-title{font-family:"Barlow Condensed",sans-serif;font-size:clamp(1.9rem,4vw,2.7rem);font-weight:700;line-height:.93;text-transform:uppercase;color:var(--azul-950);margin-bottom:9px}
    .tool-desc{color:var(--muted);font-size:.95rem;line-height:1.45}
    .footer{margin-top:28px;text-align:center;color:var(--muted);font-size:.88rem;border-top:1px solid var(--borde);padding-top:16px}
    @media(min-width:640px){.grid{grid-template-columns:repeat(2,minmax(0,1fr))}}
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <a class="home-link" href="../index.html">← Inicio</a>
      <div class="brand">
        <img src="../assets/fadec-logo.webp" alt="Logo FADEC" onerror="this.style.display='none'">
        <img src="../assets/logo-murcielagas.webp" alt="Logo Las Murcielagas" onerror="this.style.display='none'">
        <div class="brand-title">Analisis</div>
      </div>
    </div>
  </header>
  <main>
    <div class="intro">
      <h1>Analisis</h1>
      <p>Penales y partidos.</p>
    </div>
    <div class="grid">
      <a class="tool-card" href="./penales/">
        <div class="tool-title">Penales</div>
        <p class="tool-desc">Registro por sesion y estadisticas.</p>
      </a>
      <a class="tool-card" href="./partidos/">
        <div class="tool-title">Partidos</div>
        <p class="tool-desc">Registro de partidos y seguimiento.</p>
      </a>
    </div>
    <div class="footer">Las Murcielagas · Cuerpo tecnico</div>
  </main>
</body>
</html>
