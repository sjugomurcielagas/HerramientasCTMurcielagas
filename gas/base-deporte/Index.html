<!DOCTYPE html>
<html lang="es">
<head>
  <base target="_top">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Murciélagas Analytics · Base de Datos</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,800;1,600&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f4f8fc; --surface: #ffffff; --surface-2: #eaf4fb; --surface-3: #f7fbfe;
      --border: #d5e6f1; --border-hi: #9ccbe5; --text: #12283a; --muted: #4f7188;
      --accent: #118ac0; --accent-dim: rgba(17,138,192,.10); --accent-soft: #0b6f9c;
      --warn: #b7791f; --danger: #c24141; --success: #2d8a5d;
      --shadow: 0 4px 12px rgba(18,40,58,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
    body { font-family: 'Barlow', sans-serif; background-color: var(--bg); color: var(--text); overflow-x: hidden; }

    header { background: linear-gradient(135deg, #1a3a5c 0%, #118ac0 100%); color: white; padding: 15px 25px; display: flex; align-items: center; justify-content: space-between; box-shadow: var(--shadow); border-bottom: 4px solid var(--border-hi); }
    .header-logo { height: 48px; width: auto; object-fit: contain; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2)); }
    .header-center { text-align: center; }
    .header-center h1 { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 1.5rem; line-height: 1; text-transform: uppercase; letter-spacing: -0.5px; }
    .header-center span { font-size: 0.75rem; font-weight: 600; opacity: 0.9; text-transform: uppercase; letter-spacing: 1px; }

    .nav-container { display: flex; justify-content: center; gap: 15px; margin-top: -22px; padding: 0 20px; position: relative; z-index: 10; }
    .nav-btn { background: var(--surface); border: 1px solid var(--border); padding: 12px 24px; border-radius: 14px; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; color: var(--accent); cursor: pointer; box-shadow: var(--shadow); transition: all 0.2s ease; text-transform: uppercase; }
    .nav-btn.active { background: var(--accent); color: white; border-color: var(--accent); transform: translateY(2px); }

    main { padding: 40px 15px; max-width: 800px; margin: 0 auto; }
    .seccion { display: none; animation: fadeIn 0.4s ease; }
    .seccion.visible { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 25px; margin-bottom: 25px; box-shadow: var(--shadow); }
    .card-title { font-family: 'Barlow Condensed', sans-serif; font-size: 1.1rem; font-weight: 800; color: var(--accent); margin-bottom: 20px; display: flex; align-items: center; gap: 10px; text-transform: uppercase; }
    .card-title::after { content: ''; flex: 1; height: 2px; background: var(--surface-2); }

    /* SELECTOR EXPANDIDO */
    .selector-display { width: 100%; padding: 14px 18px; border-radius: 14px; border: 2px solid var(--border); background: var(--surface-3); font-family: 'Barlow', sans-serif; font-weight: 600; color: var(--muted); font-size: 1rem; cursor: pointer; display: flex; justify-content: space-between; align-items: center; user-select: none; }
    .selector-display.selected { color: var(--text); border-color: var(--accent); }
    #custom-dropdown { display: none; position: absolute; top: calc(100% + 8px); left: 0; right: 0; background: var(--surface); border: 2px solid var(--border-hi); border-radius: 16px; box-shadow: 0 8px 30px rgba(18,40,58,0.15); z-index: 200; max-height: 460px; overflow-y: auto; }
    .dd-group-label { padding: 10px 18px 6px; font-family: 'Barlow Condensed', sans-serif; font-size: 0.72rem; font-weight: 800; color: var(--accent); text-transform: uppercase; letter-spacing: 1.5px; background: var(--surface-2); border-top: 1px solid var(--border); position: sticky; top: 0; }
    .dd-item { padding: 12px 18px; cursor: pointer; border-bottom: 1px solid var(--surface-2); transition: background 0.15s; }
    .dd-item:hover { background: var(--surface-2); }
    .dd-nombre { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 1.05rem; color: var(--text); }
    .dd-detalle { font-size: 0.78rem; color: var(--muted); font-weight: 500; margin-top: 2px; }
    .dd-beca { font-size: 0.72rem; color: var(--accent-soft); font-weight: 700; margin-top: 3px; }

    .item-row { background: var(--surface-3); border: 1px solid var(--border); border-radius: 14px; padding: 18px; margin-bottom: 12px; cursor: pointer; transition: 0.2s; }
    .item-row:hover { border-color: var(--accent); background: var(--surface-2); }
    .progress-wrap { height: 8px; background: #e2eef7; border-radius: 10px; margin: 12px 0; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 10px; transition: width 0.8s ease; }

    .data-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 20px; }
    .data-box { min-width: 0; }
    .data-box label { font-family: 'Barlow Condensed', sans-serif; font-size: 0.75rem; font-weight: 700; color: var(--muted); text-transform: uppercase; margin-bottom: 4px; display: block; overflow-wrap: break-word; word-break: break-word; }
    .data-box span { font-weight: 600; color: var(--text); font-size: 1.05rem; display: block; overflow-wrap: break-word; word-break: break-word; }
    .data-box .missing { color: var(--danger); font-style: italic; font-weight: 700; }

    .bloque-header { display: flex; justify-content: space-between; align-items: center; background: linear-gradient(90deg, var(--accent-dim) 0%, transparent 100%); border-left: 4px solid var(--accent); border-radius: 0 10px 10px 0; padding: 8px 14px; margin-bottom: 16px; }
    .bloque-header-title { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 1rem; color: var(--accent-soft); letter-spacing: 1px; text-transform: uppercase; }

    .btn-op { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; padding: 10px 16px; border-radius: 10px; border: 1.5px solid var(--border); background: var(--surface); color: var(--accent); cursor: pointer; font-size: 0.9rem; transition: 0.2s; text-transform: uppercase; }
    .btn-save { background: var(--accent); color: white; border: none; padding: 16px; border-radius: 14px; font-family: 'Barlow Condensed', sans-serif; font-weight: 800; width: 100%; cursor: pointer; text-transform: uppercase; font-size: 1.1rem; }

    #login-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 2000; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(18,40,58,0.6); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
    .modal-content { background: var(--surface); border-radius: 24px; width: 100%; max-width: 480px; padding: 35px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); max-height: 90vh; overflow-y: auto; }
    .toast { position: fixed; bottom: 35px; left: 50%; transform: translateX(-50%); background: var(--text); color: white; padding: 14px 35px; border-radius: 50px; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; display: none; z-index: 3000; box-shadow: var(--shadow); }
    .page-version-tag{position:fixed;right:14px;bottom:10px;padding:4px 8px;border-radius:8px;background:rgba(16,32,51,.74);color:#e2e8f0;font-size:.72rem;letter-spacing:.02em;z-index:9999;pointer-events:none}
    @media (max-width:1024px){.page-version-tag{display:none}}
  </style>
</head>
<body>

<div id="login-screen">
  <div style="width:100%;max-width:340px;text-align:center;">
    <div style="display:flex;justify-content:center;gap:20px;margin-bottom:30px;">
      <img src="https://i.ibb.co/3W4z1N5/logo-fadec.png" style="height:70px;">
      <img src="https://i.ibb.co/pP6Z6yW/logo-murcielagas.png" style="height:70px;">
    </div>
    <h1 style="font-family:'Barlow Condensed';font-weight:800;font-size:2rem;color:#1a3a5c;margin-bottom:5px;">MURCIÉLAGAS ANALYTICS</h1>
    <p style="font-size:0.8rem;color:var(--muted);margin-bottom:35px;font-weight:700;letter-spacing:1px;text-transform:uppercase;">Módulo de Base de Datos</p>
    <input type="password" id="pwd-input" placeholder="CONTRASEÑA" style="width:100%;padding:16px;border-radius:14px;border:2.5px solid var(--border);text-align:center;margin-bottom:20px;font-size:1.1rem;">
    <button class="btn-save" onclick="login()">INGRESAR AL PANEL</button>
    <div id="login-error" style="color:var(--danger);margin-top:20px;font-weight:700;font-size:0.85rem;"></div>
  </div>
</div>

<div id="app" style="display:none;">
  <header>
    <img src="https://i.ibb.co/3W4z1N5/logo-fadec.png" class="header-logo">
    <div class="header-center"><h1>BASE DE DATOS</h1><span>Las Murciélagas · CT</span></div>
    <img src="https://i.ibb.co/pP6Z6yW/logo-murcielagas.png" class="header-logo">
  </header>

  <div class="nav-container">
    <button class="nav-btn active" id="btn-nav-ficha" onclick="ir('ficha')">👤 FICHAS</button>
    <button class="nav-btn" id="btn-nav-faltantes" onclick="ir('faltantes')">⚠️ ALERTAS</button>
  </div>

  <main>
    <section id="sec-ficha" class="seccion visible">
      <div class="card">
        <div class="card-title">SELECCIONAR INTEGRANTE</div>
        <div style="position:relative;">
          <div id="selector-display" class="selector-display" onclick="toggleDropdown()">
            <span id="selector-texto">— Seleccioná un integrante —</span>
            <span style="font-size:0.85rem;opacity:0.6;">▾</span>
          </div>
          <div id="custom-dropdown">
            <div style="padding:12px 14px;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:10;">
              <input type="text" id="search-input" placeholder="🔍  Buscar por nombre o rol..." oninput="filtrarDropdown(this.value)"
                style="width:100%;padding:10px 14px;border-radius:10px;border:1.5px solid var(--border);font-family:'Barlow';font-size:0.95rem;color:var(--text);">
            </div>
            <div id="dropdown-lista"></div>
          </div>
        </div>
      </div>
      <div id="ficha-contenido"></div>
    </section>

    <section id="sec-faltantes" class="seccion">
      <div class="card">
        <div class="card-title">ALERTAS Y PENDIENTES</div>
        <div id="faltantes-lista">Cargando base de datos...</div>
      </div>
    </section>
  </main>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal-content">
    <h2 id="modal-titulo" style="font-family:'Barlow Condensed';font-weight:800;margin-bottom:25px;color:var(--accent);text-transform:uppercase;">EDITAR</h2>
    <div id="modal-campos"></div>
    <div style="display:flex;gap:12px;margin-top:30px;">
      <button class="btn-op" style="flex:1" onclick="cerrarModal()">CANCELAR</button>
      <button class="btn-save" style="flex:2" onclick="guardarModal()">GUARDAR CAMBIOS</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>
<input type="file" id="upload-foto" style="display:none" accept="image/*" onchange="handleUpload(this,'foto')">
<input type="file" id="upload-dni" style="display:none" accept=".pdf,image/*" onchange="handleUpload(this,'dni')">
<input type="file" id="upload-pasaporte" style="display:none" accept=".pdf,image/*" onchange="handleUpload(this,'pasaporte')">
<input type="file" id="upload-cud" style="display:none" accept=".pdf,image/*" onchange="handleUpload(this,'cud')">
<input type="file" id="upload-apto" style="display:none" accept=".pdf,image/*" onchange="handleUpload(this,'apto_medico')">
<input type="file" id="upload-antidoping" style="display:none" accept=".pdf,image/*" onchange="handleUpload(this,'antidoping')">
<input type="file" id="upload-tue" style="display:none" accept=".pdf,image/*" onchange="handleUpload(this,'tue')">
<input type="file" id="upload-ibsa" style="display:none" accept=".pdf,image/*" onchange="handleUpload(this,'ibsa_elegibilidad')">

<script>
var USUARIO = 'Santiago Jugo';
var FICHA_ACTUAL = null;
var DNI_ACTUAL = null;
var PLANTEL_DATA = [];

// ── ETIQUETAS ─────────────────────────────────────────────────────────────────
// NOTA ANUAL: actualizar las etiquetas de Beca_SDN_2024 y Beca_SSDN_2025
// para reflejar el ciclo vigente. Los nombres de columna en Sheets NO cambian.
// Ciclo actual: anterior = 2025, actual = 2026
var ETIQUETAS = {
  Apellido:'Apellido', Nombre:'Nombre', DNI:'DNI', Fecha_Nac:'Fecha de Nac.',
  Sexo:'Sexo', Rol:'Rol', Estado_Convocatoria:'Estado',
  Telefono:'Teléfono', Email:'Email', Direccion:'Dirección',
  Emergencia_Nombre:'Emergencia: Nombre', Emergencia_Vinculo:'Emergencia: Vínculo', Emergencia_Tel:'Emergencia: Tel.',
  DNI_Vto:'Venc. DNI',
  Pasaporte_Nro:'N° Pasaporte', Pasaporte_Vto:'Venc. Pasaporte',
  CUD_Vto:'Venc. CUD',
  Apto_Medico_Vto:'Venc. Apto Médico', Apto_Medico_Vigente:'Apto Vigente',
  Clasif_Visual_IBSA:'Clasif. IBSA', CUD_Nro:'N° CUD',
  TUE_Estado:'Estado TUE', TUE_Fecha_Vencimiento:'Venc. TUE', TUE_IBSA_Enviado:'Envío TUE a IBSA',
  Club_Equipo:'Club / Equipo', Posicion:'Posición', Protocolos_SSDN:'Protocolos SSDN',
  Beca_SDN_2024:'Beca 2025 (anterior)',
  Beca_SSDN_2025:'Beca 2026 (actual)',
  Nivel_Educativo:'Nivel Educativo',
  Institucion_Educativa:'Institución',
  Titulo_Educativo:'Título / Carrera',
  Ocupacion:'Ocupación',
  Dieta_Especial:'Dieta Especial', Alergias:'Alergias',
  Talle_Remera:'Talle Remera', Talle_Pantalon:'Talle Pantalón', Talle_Calzado:'Talle Calzado',
  CBU:'CBU', Observaciones:'Observaciones'
};

// ── BLOQUES ───────────────────────────────────────────────────────────────────
var BLOQUES = {
  'IDENTIDAD':      ['Apellido','Nombre','DNI','Fecha_Nac','Sexo','Rol','Estado_Convocatoria'],
  'CONTACTO':       ['Telefono','Email','Direccion','Emergencia_Nombre','Emergencia_Vinculo','Emergencia_Tel'],
  'DOCUMENTACIÓN':  ['DNI_Vto','Pasaporte_Nro','Pasaporte_Vto','CUD_Nro','CUD_Vto','Apto_Medico_Vto','Apto_Medico_Vigente','Clasif_Visual_IBSA','TUE_Estado','TUE_Fecha_Vencimiento','TUE_IBSA_Enviado'],
  'DEPORTIVO':      ['Club_Equipo','Posicion','Protocolos_SSDN'],
  'BECAS':          ['Beca_SDN_2024','Beca_SSDN_2025'],
  'PROFESIONAL':    ['Nivel_Educativo','Institucion_Educativa','Titulo_Educativo','Ocupacion'],
  'INDUMENTARIA':   ['Talle_Remera','Talle_Pantalon','Talle_Calzado'],
  'ADMINISTRATIVO': ['CBU','Alergias','Dieta_Especial','Observaciones']
};

var ROLES_CT = ['director','guia','guía','preparador','preparadora','asistente','psicól','psicol','médic','medic','kinesiol','nutricion'];

function esCT(rol) {
  var r = (rol||'').toLowerCase();
  return ROLES_CT.some(function(k){ return r.indexOf(k) > -1; });
}

function driveEmbedUrl(url) {
  if (!url) return '';
  var m = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
  return m ? 'https://drive.google.com/thumbnail?id=' + m[1] + '&sz=w200' : url;
}

function escapar(s) { return (s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }
function escapeHtml(s) {
  return String(s || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}
function escapeAttr(s) { return escapeHtml(s).replace(/`/g, '&#96;'); }
function safeUrl(url) {
  var v = String(url || '').trim();
  return /^https?:\/\//i.test(v) ? escapeAttr(v) : '';
}

// ── LOGIN ─────────────────────────────────────────────────────────────────────
function login() {
  var pwd = document.getElementById('pwd-input').value;
  google.script.run.withSuccessHandler(function(ok){
    if(ok){
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      inicializar();
    } else { document.getElementById('login-error').innerText = 'CONTRASEÑA INCORRECTA'; }
  }).verificarPassword(pwd);
}

function inicializar() { cargarFaltantes(); cargarDropdown(); }

function ir(sec) {
  document.querySelectorAll('.seccion').forEach(function(s){ s.classList.remove('visible'); });
  document.querySelectorAll('.nav-btn').forEach(function(b){ b.classList.remove('active'); });
  document.getElementById('sec-' + sec).classList.add('visible');
  document.getElementById('btn-nav-' + sec).classList.add('active');
}

// ── DROPDOWN PERSONALIZADO ────────────────────────────────────────────────────
function cargarDropdown() {
  google.script.run.withSuccessHandler(function(plantel){
    PLANTEL_DATA = plantel;
    renderDropdownLista(plantel);
  }).getPlantel();
}

function renderDropdownLista(lista) {
  var ct  = lista.filter(function(p){ return  esCT(p.rol); });
  var jug = lista.filter(function(p){ return !esCT(p.rol); });
  var html = '';
  if(ct.length) {
    html += '<div class="dd-group-label">⚙️ &nbsp;CUERPO TÉCNICO</div>';
    ct.forEach(function(p){ html += ddItemHTML(p); });
  }
  if(jug.length) {
    html += '<div class="dd-group-label">⚽ &nbsp;JUGADORAS</div>';
    jug.forEach(function(p){ html += ddItemHTML(p); });
  }
  if(!html) html = '<div style="padding:20px;color:var(--muted);text-align:center;font-style:italic;">Sin resultados</div>';
  document.getElementById('dropdown-lista').innerHTML = html;
}

function ddItemHTML(p) {
  var estado = escapeHtml(p.estado || '');
  return '<div class="dd-item" onclick="seleccionarPersona(\'' + escapar(p.dni) + '\',\'' + escapar(p.nombre) + '\')">' +
    '<div class="dd-nombre">' + escapeHtml(p.nombre || '') + '</div>' +
    '<div class="dd-detalle">' + escapeHtml(p.rol || '') + (estado ? ' &nbsp;·&nbsp; ' + estado : '') + '</div>' +
    '</div>';
}

function toggleDropdown() {
  var dd = document.getElementById('custom-dropdown');
  var abierto = dd.style.display !== 'none' && dd.style.display !== '';
  dd.style.display = abierto ? 'none' : 'block';
  if(!abierto) { document.getElementById('search-input').value = ''; renderDropdownLista(PLANTEL_DATA); setTimeout(function(){ document.getElementById('search-input').focus(); }, 50); }
}

function filtrarDropdown(q) {
  var ql = q.toLowerCase();
  var filtrado = PLANTEL_DATA.filter(function(p){
    return (p.nombre||'').toLowerCase().indexOf(ql) > -1 || (p.rol||'').toLowerCase().indexOf(ql) > -1;
  });
  renderDropdownLista(filtrado);
}

function seleccionarPersona(dni, nombre) {
  var disp = document.getElementById('selector-display');
  document.getElementById('selector-texto').innerText = nombre;
  disp.classList.add('selected');
  document.getElementById('custom-dropdown').style.display = 'none';
  DNI_ACTUAL = dni;
  google.script.run.withSuccessHandler(function(f){ FICHA_ACTUAL = f; renderFicha(f); }).getFicha(dni);
}

document.addEventListener('click', function(e){
  var dd = document.getElementById('custom-dropdown');
  var disp = document.getElementById('selector-display');
  if(dd && !dd.contains(e.target) && disp && !disp.contains(e.target)) dd.style.display = 'none';
});

// ── ALERTAS ───────────────────────────────────────────────────────────────────
function cargarFaltantes() {
  google.script.run.withSuccessHandler(function(data){
    var html = '';
    data.forEach(function(p){
      var color = p.completitud > 80 ? 'var(--success)' : (p.completitud > 40 ? 'var(--warn)' : 'var(--danger)');
      var nombre = escapeHtml(p.nombre || '');
      var completitud = escapeHtml(p.completitud);
      html += '<div class="item-row" onclick="irAFicha(\'' + escapar(p.dni) + '\')">' +
        '<div style="display:flex;justify-content:space-between;font-weight:700;">' +
        '<span>' + nombre + '</span><span style="color:' + color + '">' + completitud + '%</span></div>' +
        '<div class="progress-wrap"><div class="progress-fill" style="width:' + p.completitud + '%;background:' + color + '"></div></div>' +
        '<div style="display:flex;flex-wrap:wrap;gap:6px;">' +
        p.faltantes.map(function(f){ return '<span style="font-size:0.7rem;padding:3px 8px;background:var(--bg);border-radius:6px;color:var(--muted);font-weight:700">' + escapeHtml(ETIQUETAS[f]||f) + '</span>'; }).join('') +
        '</div></div>';
    });
    document.getElementById('faltantes-lista').innerHTML = html ||
      '<p style="color:var(--success);font-weight:700;text-align:center;padding:20px;">✓ Sin pendientes críticos</p>';
  }).getFaltantes();
}

function irAFicha(dni) {
  ir('ficha');
  var p = PLANTEL_DATA.filter(function(x){ return x.dni === dni; })[0];
  if(p) seleccionarPersona(p.dni, p.nombre);
}

// ── RENDER FICHA ──────────────────────────────────────────────────────────────
function renderFicha(f) {
  var fotoUrl = safeUrl(driveEmbedUrl(f.Foto_Link));
  var apellido = escapeHtml(f.Apellido || '');
  var nombre = escapeHtml(f.Nombre || '');
  var rol = escapeHtml(f.Rol || '');
  var dni = escapeHtml(f.DNI || '');

  var html = '<div class="card">' +
    '<div style="display:flex;align-items:center;gap:20px;margin-bottom:30px;">' +
    '<div style="width:80px;height:80px;border-radius:50%;background:var(--surface-2);border:4.5px solid var(--accent);overflow:hidden;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow);flex-shrink:0;">' +
    (fotoUrl
      ? '<img src="' + fotoUrl + '" style="width:100%;height:100%;object-fit:cover;" onerror="this.parentNode.innerHTML=\'<span style=\\\"font-size:2rem\\\">👤</span>\'">'
      : '<span style="font-size:2rem;">👤</span>') +
    '</div>' +
    '<div style="min-width:0;">' +
    '<div style="font-family:\'Barlow Condensed\';font-size:1.8rem;font-weight:800;line-height:1;color:var(--accent);overflow-wrap:break-word;">' + apellido + ', ' + nombre + '</div>' +
    '<div style="font-size:0.9rem;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:0.5px;">' + rol + ' | DNI: ' + dni + '</div>' +
    '</div></div>';

  for(var titulo in BLOQUES) {
    var t = titulo;
    if (t === 'DOCUMENTACIÓN') {
      html += renderDocumentacionSection(f);
      continue;
    }
    html += '<div style="margin-top:22px;">' +
      '<div class="bloque-header">' +
      '<span class="bloque-header-title">' + t + '</span>' +
      '<button class="btn-op" onclick="abrirModal(\'' + escapar(t) + '\')">EDITAR</button>' +
      '</div><div class="data-grid">';
    BLOQUES[t].forEach(function(c){
      var val = (f[c]||'').toString();
      var falta = val === '' || val === 'PENDIENTE';
      html += '<div class="data-box"><label>' + escapeHtml(ETIQUETAS[c]||c) + '</label>' +
        '<span class="' + (falta ? 'missing' : '') + '">' + escapeHtml(val || 'FALTA') + '</span></div>';
    });
    html += '</div></div>';
  }
  html += '</div>';

  document.getElementById('ficha-contenido').innerHTML = html;
}

function renderDocumentacionSection(f) {
  var html = '<div style="margin-top:22px;">' +
    '<div class="bloque-header">' +
    '<span class="bloque-header-title">DOCUMENTACIÓN</span>' +
    '<button class="btn-op" onclick="abrirModal(\'DOCUMENTACIÓN\')">EDITAR</button>' +
    '</div>' +
    '<div class="data-grid">';

  BLOQUES['DOCUMENTACIÓN'].forEach(function(c){
    var val = (f[c]||'').toString();
    var falta = val === '' || val === 'PENDIENTE';
    html += '<div class="data-box"><label>' + escapeHtml(ETIQUETAS[c]||c) + '</label>' +
      '<span class="' + (falta ? 'missing' : '') + '">' + escapeHtml(val || 'FALTA') + '</span></div>';
  });

  html += '</div>' +
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:15px;margin-top:15px;">' +
    renderFileBtn('DNI COMPLETO', f.DNI_Scan_Link, 'upload-dni') +
    renderFileBtn('PASAPORTE', f.Pasaporte_Scan_Link, 'upload-pasaporte') +
    renderFileBtn('CUD', f.CUD_Link, 'upload-cud') +
    renderFileBtn('APTO MÉDICO', f.Apto_Medico_Link, 'upload-apto') +
    renderFileBtn('ANTI-DOPING', f.Anti_Doping_Link, 'upload-antidoping') +
    renderFileBtn('IBSA ELEGIBILIDAD', f.IBSA_Elegibilidad_Archivo, 'upload-ibsa') +
    renderFileBtn('TUE', f.TUE_Archivo, 'upload-tue') +
    renderFileBtn('FOTO PERFIL', f.Foto_Link, 'upload-foto') +
    '</div>' +
    '</div>';
  return html;
}

function renderFileBtn(label, link, id) {
  var safeLink = safeUrl(link);
  var estado = safeLink ? 'Cargado' : 'Faltante';
  var color = safeLink ? 'var(--success)' : 'var(--danger)';
  var uploadBtn = id
    ? '<label for="' + escapeAttr(id) + '" class="btn-op" style="flex:1;text-align:center;cursor:pointer;">' + (safeLink ? 'REEMPLAZAR' : 'SUBIR') + '</label>'
    : '';
  return '<div style="background:var(--surface-3);padding:14px;border-radius:14px;display:flex;flex-direction:column;gap:12px;border:1px solid var(--border);">' +
    '<span style="font-size:0.7rem;font-weight:800;color:var(--accent-soft);text-transform:uppercase;">' + escapeHtml(label) + '</span>' +
    '<span style="font-size:0.8rem;font-weight:700;color:' + color + ';">' + estado + '</span>' +
    '<div style="display:flex;gap:8px;">' +
    (safeLink ? '<a href="' + safeLink + '" target="_blank" rel="noopener noreferrer" class="btn-op" style="flex:1;text-align:center;background:var(--accent);color:white;border:none;text-decoration:none;padding-top:10px;">VER</a>' : '') +
    uploadBtn +
    '</div></div>';
}

// ── MODAL ─────────────────────────────────────────────────────────────────────
function abrirModal(bloque) {
  document.getElementById('modal-titulo').innerText = bloque;
  var html = '';
  (BLOQUES[bloque]||[]).forEach(function(c){
    var val = escapeAttr((FICHA_ACTUAL[c]||'').toString());
    html += '<div style="margin-bottom:18px;">' +
      '<label style="font-size:0.8rem;font-weight:700;color:var(--muted);text-transform:uppercase;display:block;margin-bottom:6px;">' + escapeHtml(ETIQUETAS[c]||c) + '</label>' +
      '<input type="text" name="' + escapeAttr(c) + '" value="' + val + '" style="width:100%;padding:12px;border-radius:10px;border:2px solid var(--border);font-family:\'Barlow\';font-size:1rem;">' +
      '</div>';
  });
  document.getElementById('modal-campos').innerHTML = html;
  document.getElementById('modal-overlay').style.display = 'flex';
}

function cerrarModal() { document.getElementById('modal-overlay').style.display = 'none'; }

function guardarModal() {
  var cambios = {};
  document.querySelectorAll('#modal-campos [name]').forEach(function(i){ cambios[i.name] = i.value; });
  google.script.run.withSuccessHandler(function(){
    cerrarModal(); toast('DATOS SINCRONIZADOS');
    var nombreActual = document.getElementById('selector-texto').innerText;
    seleccionarPersona(DNI_ACTUAL, nombreActual);
    cargarFaltantes();
  }).guardarCambios(DNI_ACTUAL, cambios, USUARIO);
}

// ── UPLOAD ────────────────────────────────────────────────────────────────────
function handleUpload(input, tipo) {
  if(!input.files[0]) return;
  var file = input.files[0];
  var reader = new FileReader();
  reader.onload = function(e) {
    var base64 = e.target.result.split(',')[1];
    google.script.run.withSuccessHandler(function(res){
      if(res.ok) { toast('ARCHIVO CARGADO'); var n = document.getElementById('selector-texto').innerText; seleccionarPersona(DNI_ACTUAL, n); }
    }).subirArchivo(DNI_ACTUAL, tipo, base64, file.type, file.name.split('.').pop());
  };
  reader.readAsDataURL(file);
}

function toast(m) {
  var t = document.getElementById('toast');
  t.innerText = m; t.style.display = 'block';
  setTimeout(function(){ t.style.display = 'none'; }, 3000);
}
</script>
