<style>
:root{
  --bg:#e8f4ff;
  --surface:#f4faff;
  --surface2:#dbeeff;
  --border:#b8d8f0;
  --border2:#7ab8e0;
  --celeste:#4a9fd4;
  --celeste2:#2878b0;
  --celeste-light:#c8e8f8;
  --blanco:#ffffff;
  --text:#1a3a5c;
  --text-dim:#5a8aaa;
  --team-a:#e05c2a;
  --team-b:#2878b0;
  --red:#d32f2f;
  --green:#2e7d32;
  --orange:#e05c2a;
  --phase1:1;
  --phase2:0.68;
  --phase3:0.42;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);font-family:'Barlow',sans-serif;color:var(--text);overflow:hidden;user-select:none}

/* ===== LAYOUT PRINCIPAL ===== */
#app{
  display:grid;
  grid-template-rows:auto 1fr auto;
  grid-template-columns:56px 1fr;
  height:100vh;height:100dvh;
}

/* HEADER: ocupa ambas columnas */
#header{
  grid-column:1/-1;
  background:linear-gradient(160deg,#1a3a5c 0%,#2878b0 55%,#5aaee0 100%);
  padding:6px 12px;
  display:flex;align-items:center;justify-content:space-between;gap:8px;
  box-shadow:0 3px 16px rgba(0,0,0,.3);
  min-height:54px;
}
.header-logo-wrap{display:flex;align-items:center;justify-content:center;width:44px;height:44px;flex-shrink:0}
.header-logo{max-width:44px;max-height:44px;object-fit:contain;filter:drop-shadow(0 2px 6px rgba(0,0,0,.35))}
.header-center{text-align:center;flex:1}
.header-title{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:800;letter-spacing:2px;color:#fff;text-transform:uppercase;line-height:1.1}
.header-sub{font-size:9px;color:rgba(255,255,255,.6);letter-spacing:1.5px;margin-top:2px}

/* PANEL LATERAL IZQUIERDO */
#sidebar{
  grid-column:1;
  grid-row:2;
  background:var(--blanco);
  border-right:2px solid var(--border2);
  display:flex;flex-direction:column;align-items:center;
  padding:6px 0;gap:4px;
  overflow:hidden;
  box-shadow:3px 0 12px rgba(74,159,212,.1);
  z-index:10;
}
.sb-btn{
  width:44px;height:44px;border-radius:10px;border:2px solid var(--border);
  background:var(--blanco);color:var(--celeste2);
  font-family:'Barlow Condensed',sans-serif;font-size:9.5px;font-weight:700;
  cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;
  transition:all .15s;flex-shrink:0;
  letter-spacing:.3px;text-align:center;line-height:1.1;
}
.sb-btn:active{transform:scale(.90)}
.sb-btn .sb-icon{font-size:16px;line-height:1}
.sb-btn.team-a{border-color:#4a9fd4;color:#4a9fd4}
.sb-btn.team-a.sel{background:#4a9fd4;color:#fff}
.sb-btn.team-b{border-color:#1a2a4a;color:#1a2a4a}
.sb-btn.team-b.sel{background:#1a2a4a;color:#fff}
.sb-btn.primary{background:var(--celeste);border-color:var(--celeste);color:#fff}
.sb-btn.danger{border-color:#ffb3a0;color:var(--red)}
.sb-btn.arrow-on{background:var(--celeste-light);border-color:var(--celeste);color:var(--celeste2)}
.sb-sep{width:36px;height:1px;background:var(--border);flex-shrink:0;margin:2px 0}
.phase-badge{
  width:44px;height:22px;border-radius:8px;border:2px solid var(--border);
  background:var(--surface);color:var(--text-dim);
  font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:800;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;letter-spacing:.5px;transition:all .15s;
}
.phase-badge.active{background:#1a3a5c;border-color:#1a3a5c;color:#fff}

/* CANVAS WRAP */
#canvas-wrap{
  grid-column:2;grid-row:2;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;background:var(--bg);padding:3px;
  position:relative;
}
#canvas-outer{
  display:flex;align-items:center;justify-content:center;
  position:relative;
}
#canvas{
  transform-origin:center center;
  display:block;
  border-radius:6px;
  box-shadow:0 4px 20px rgba(0,0,0,.2),0 0 0 2px var(--border2);
  touch-action:none;
  transform:rotate(90deg);
}

/* BARRA INFERIOR */
#bottom{
  grid-column:1/-1;
  background:var(--blanco);border-top:2px solid var(--border2);
  flex-shrink:0;display:flex;flex-direction:column;
  box-shadow:0 -4px 20px rgba(74,159,212,.12);
}
#statusbar{
  background:var(--celeste-light);border-bottom:1px solid var(--border);
  padding:3px 12px;font-family:'Barlow Condensed',sans-serif;
  font-size:11px;color:var(--celeste2);letter-spacing:.3px;
  text-align:center;min-height:20px;
}
/* Barra de flechas: siempre visible */
#arrow-bar{
  padding:6px 8px;display:flex;gap:5px;align-items:center;overflow-x:auto;
  flex-wrap:nowrap;min-width:0;
}
#arrow-bar::-webkit-scrollbar{display:none}
.chip{padding:5px 10px;border-radius:14px;border:1.5px solid var(--border);background:var(--surface);color:var(--text-dim);font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .15s;flex-shrink:0}
.chip.active{background:var(--celeste-light);border-color:var(--celeste);color:var(--celeste2)}
.chip.arrow-on{background:#1a3a5c;border-color:#1a3a5c;color:#fff}
.vsep{width:1px;height:28px;background:var(--border);flex-shrink:0}
.bar-label{font-family:'Barlow Condensed',sans-serif;font-size:9px;color:var(--text-dim);letter-spacing:.8px;flex-shrink:0;text-transform:uppercase}
/* Fila animación: aparece cuando hay flechas con fases */
#anim-bar{
  padding:5px 8px;display:flex;gap:5px;align-items:center;border-top:1px solid var(--border);
  overflow-x:auto;flex-wrap:nowrap;
}
#anim-bar::-webkit-scrollbar{display:none}

/* Botones generales */
.btn{padding:6px 12px;border-radius:18px;border:2px solid var(--border2);background:var(--blanco);color:var(--celeste2);font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .15s;letter-spacing:.3px;display:flex;align-items:center;gap:4px;flex-shrink:0}
.btn:active{transform:scale(.94)}
.btn-primary{background:var(--celeste);border-color:var(--celeste);color:#fff}
.btn-danger{border-color:#ffb3a0;color:var(--red);background:#fff8f6}
.btn-sm{padding:5px 9px;font-size:11px;border-radius:14px}

/* POPUP EDICIÓN */
#edit-popup{display:none;position:fixed;z-index:300;background:var(--blanco);border:2px solid var(--celeste);border-radius:14px;padding:14px;box-shadow:0 8px 30px rgba(0,0,0,.2);min-width:180px}
.einput{background:var(--surface);border:1.5px solid var(--border);border-radius:8px;padding:7px 10px;color:var(--text);font-family:'Barlow',sans-serif;font-size:13px;width:100%;outline:none;margin-bottom:6px}
.einput:focus{border-color:var(--celeste)}

/* MODALES */
#roster-modal{display:none;position:fixed;inset:0;z-index:200;background:rgba(26,58,92,.5);backdrop-filter:blur(4px)}
#roster-modal.show{display:flex;align-items:flex-end}
#roster-sheet{background:var(--blanco);border-radius:20px 20px 0 0;width:100%;max-height:80vh;display:flex;flex-direction:column;box-shadow:0 -8px 40px rgba(0,0,0,.2)}
#roster-handle{width:40px;height:4px;background:var(--border2);border-radius:2px;margin:10px auto 6px}
#roster-header{padding:0 16px 10px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
#roster-title{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:800;color:var(--celeste2);letter-spacing:1px}
#roster-close{background:var(--surface2);border:none;border-radius:50%;width:28px;height:28px;color:var(--text-dim);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
#roster-team-toggle{display:flex;gap:6px;padding:10px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
#roster-body{overflow-y:auto;flex:1;padding:10px 16px 20px}
#roster-body::-webkit-scrollbar{display:none}
.rcard{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:10px;border:1.5px solid var(--border);background:var(--surface);margin-bottom:5px;cursor:pointer;transition:all .15s}
.rcard:active{background:var(--celeste-light);border-color:var(--celeste)}
.rcard.placed{opacity:.35;pointer-events:none}
.rnum{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:800;color:var(--celeste2);width:26px;text-align:center;flex-shrink:0}
.rinfo{flex:1}
.rapellido{font-size:13px;font-weight:500;color:var(--text)}
.rnombre{font-size:10px;color:var(--text-dim)}
.rgk{font-size:9px;color:var(--orange);font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:.5px;background:#fff3ef;padding:2px 6px;border-radius:6px;border:1px solid #ffc8a8}
.rsection{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:1.5px;color:var(--text-dim);text-transform:uppercase;margin:10px 0 6px;padding-bottom:4px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}

/* MODAL GUARDAR */
#save-modal{display:none;position:fixed;inset:0;z-index:250;background:rgba(26,58,92,.5);backdrop-filter:blur(4px);align-items:center;justify-content:center}
#save-modal.show{display:flex}
#save-card{background:var(--blanco);border-radius:14px;padding:18px;width:290px;box-shadow:0 8px 30px rgba(0,0,0,.2)}
#save-title{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:800;color:var(--celeste2);margin-bottom:10px}
.saved-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;border:1.5px solid var(--border);background:var(--surface);margin-bottom:4px;cursor:pointer;transition:all .15s}
.saved-item:active{background:var(--celeste-light)}
.saved-name{flex:1;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;color:var(--text)}
.saved-date{font-size:9px;color:var(--text-dim)}

/* RIVAL FORM */
#rival-form{display:none;position:fixed;inset:0;z-index:250;background:rgba(26,58,92,.5);align-items:center;justify-content:center}
#rival-form.show{display:flex}
#rival-card{background:var(--blanco);border-radius:14px;padding:16px;width:260px;box-shadow:0 8px 30px rgba(0,0,0,.2)}

/* TOAST */
#hint-toast{display:none;position:fixed;bottom:22%;left:50%;transform:translateX(-50%);background:rgba(26,58,92,.92);color:#fff;padding:8px 18px;border-radius:20px;font-size:12px;font-family:'Barlow Condensed',sans-serif;letter-spacing:.5px;z-index:400;text-align:center;pointer-events:none;max-width:82vw;box-shadow:0 4px 16px rgba(0,0,0,.3)}
#hint-toast.show{display:block}

/* BOTÓN DOWNLOAD */
#dl-btn{display:none;position:fixed;bottom:20%;right:10px;z-index:350;background:#1a3a5c;border:none;border-radius:16px;color:#fff;padding:10px 16px;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.3);letter-spacing:.5px}

  .back-home {
  position: fixed;
  top: 8px;
  left: 8px;
  z-index: 500;
  display: inline-flex;
  align-items: center;
  width: fit-content;
  gap: 6px;
  padding: 7px 10px;
  border-radius: 999px;
  border: 1px solid rgba(255,255,255,.45);
  background: rgba(255,255,255,.16);
  color: #ffffff;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .06em;
  text-transform: uppercase;
  text-decoration: none;
  box-shadow: 0 4px 12px rgba(0,0,0,.18);
}

.back-home:hover {
  background: rgba(255,255,255,.25);
}

const IW=900,IH=520;
canvas.width=IW;canvas.height=IH;

function resizeCanvas(){
  const wrap=document.getElementById('canvas-wrap');
  const availW=wrap.clientWidth-6;
  const availH=wrap.clientHeight-6;
  const scaleByW=availW/IH;
  const scaleByH=availH/IW;
  const scale=Math.min(scaleByW,scaleByH);
  const visW=IH*scale;
  const visH=IW*scale;
  canvas.style.width=IW+'px';
  canvas.style.height=IH+'px';
  canvas.style.transform=`rotate(90deg) scale(${scale})`;
  document.getElementById('canvas-outer').style.width=visW+'px';
  document.getElementById('canvas-outer').style.height=visH+'px';
}
window.addEventListener('resize',resizeCanvas);
resizeCanvas();

// getPos — NO MODIFICAR (compensación de rotación CSS)
function getPos(e){
  const rect=canvas.getBoundingClientRect();
  // getBoundingClientRect nos da el rect del elemento ya transformado (rotado y escalado)
  const src=e.touches?e.touches[0]:e;
  const cx=src.clientX,cy=src.clientY;
  // Centro del elemento en pantalla
  const ex=rect.left+rect.width/2;
  const ey=rect.top+rect.height/2;
  // Vector desde el centro
  const dx=cx-ex,dy=cy-ey;
  // Rotar -90° para volver al espacio del canvas (deshacemos la rotación CSS)
  const rx= dy; // x_canvas = dy
  const ry=-dx; // y_canvas = -dx
  // Escalar al espacio interno del canvas
  const scaleX=IW/rect.height; // rect.height es el largo del canvas rotado
  const scaleY=IH/rect.width;  // rect.width es el corto del canvas rotado
  return{x:rx*scaleX+IW/2, y:ry*scaleY+IH/2};
}

// =============================================
// FASES
// =============================================
function getArrowPhase(arrowIdx){
  // Calcula la fase de una flecha según faseado automático y manual
  // Faseado manual: si arrowIdx está después de un manualPhaseBreak, se suma la fase
  let phase=1;
  // contar breaks manuales antes de este índice
  for(const bp of manualPhaseBreaks){
    if(bp<=arrowIdx) phase++;
    else break;
  }
  // Faseado automático: si la jugadora origen ya tiene una flecha en la misma fase, la siguiente es fase+1
  // Aplicado sobre el resultado manual
  return phase;
}

function getArrowPhaseAuto(arrows, idx){
  // Implementación completa: fase = max(manual_phase, auto_phase)
  const a=arrows[idx];
  // Fase base por breaks manuales
  let manualPhase=1;
  let sortedBreaks=[...manualPhaseBreaks].sort((a,b)=>a-b);
  for(const bp of sortedBreaks){
    if(bp<idx) manualPhase++;
  }
  // Faseado automático: contar flechas anteriores del mismo origen con la misma fase
  if(a.from==null) return manualPhase;
  let usedPhases=new Set();
  for(let i=0;i<idx;i++){
    if(arrows[i].from===a.from){
      usedPhases.add(computePhase(arrows,i));
    }
  }
  let autoPhase=manualPhase;
  while(usedPhases.has(autoPhase)) autoPhase++;
  return Math.max(manualPhase,autoPhase);
}

function computePhase(arrowList, idx){
  // Fase = número de acciones previas del mismo jugador + 1
  // Flechas sin from (curvas/libres sin origen) usan fase 1
  const a=arrowList[idx];
  if(a.from==null) return 1;
  let count=0;
  for(let i=0;i<idx;i++){
    if(arrowList[i].from===a.from) count++;
  }
  return count+1;
}

function newPhase(){
  // Las fases se calculan automáticamente — este botón muestra la fase máxima actual
  const max=getMaxPhase();
  toast('Fases automáticas: F1…F'+max+' según acciones por jugador');
  draw();
}

function getMaxPhase(){
  if(arrows.length===0) return 1;
  let max=1;
  for(let i=0;i<arrows.length;i++) max=Math.max(max,computePhase(arrows,i));
  return max;
}

// =============================================

  editingIdx=idx;const p=players[idx];
  document.getElementById('edit-num').value=p.num||'';
  document.getElementById('edit-name').value=p.role||'';
  const pop=document.getElementById('edit-popup');pop.style.display='block';
  pop.style.left='50%';pop.style.top='30%';pop.style.transform='translateX(-50%)';
}
function applyEdit(){
  if(editingIdx===null)return;
  const num=document.getElementById('edit-num').value.trim();
  const name=document.getElementById('edit-name').value.trim();
  if(num)players[editingIdx].num=isNaN(num)?num:parseInt(num);
  if(name)players[editingIdx].role=name;
  closeEdit();draw();
}
function closeEdit(){editingIdx=null;document.getElementById('edit-popup').style.display='none';}
document.addEventListener('keydown',e=>{
  if(e.key==='Escape') closeEdit();
  if((e.ctrlKey||e.metaKey)&&e.key==='z'){e.preventDefault();undo();}
});

function showSaveModal(){
  renderSavedList();
  document.getElementById('save-modal').classList.add('show');
}
function closeSaveModal(e){
  if(!e||e.target===document.getElementById('save-modal'))
    document.getElementById('save-modal').classList.remove('show');
}
function saveExercise(){
  const name=document.getElementById('save-name-input').value.trim();
  if(!name){toast('Escribí un nombre para el ejercicio');return;}
  const exercises=JSON.parse(localStorage.getItem('tb_exercises')||'[]');
  exercises.unshift({
    name,date:new Date().toLocaleDateString('es-AR'),
    players:JSON.parse(JSON.stringify(players)),
    arrows:JSON.parse(JSON.stringify(arrows)),
    breaks:[...manualPhaseBreaks],
    phase:currentPhase,
    cA:counterA,cB:counterB,
    pm:[...placedMur]
  });
  if(exercises.length>30)exercises.pop();
  localStorage.setItem('tb_exercises',JSON.stringify(exercises));
  document.getElementById('save-name-input').value='';
  toast('✓ Ejercicio guardado: '+name);
  renderSavedList();
}
function renderSavedList(){
  const exercises=JSON.parse(localStorage.getItem('tb_exercises')||'[]');
  const list=document.getElementById('saved-list');list.innerHTML='';
  if(!exercises.length){list.innerHTML='<div style="color:var(--text-dim);font-size:12px;text-align:center;padding:10px">No hay ejercicios guardados</div>';return;}
  exercises.forEach((ex,i)=>{
    const d=document.createElement('div');d.className='saved-item';
    d.innerHTML=`<div class="saved-name">${ex.name}</div><div class="saved-date">${ex.date}</div>
      <button onclick="deleteExercise(${i})" style="background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:14px;padding:0 2px">✕</button>`;
    d.querySelector('.saved-name').addEventListener('click',()=>loadExercise(i));
    list.appendChild(d);
  });
}
function loadExercise(i){
  const exercises=JSON.parse(localStorage.getItem('tb_exercises')||'[]');
  const ex=exercises[i];
  saveHistory();
  players=JSON.parse(JSON.stringify(ex.players));
  arrows=JSON.parse(JSON.stringify(ex.arrows));
  manualPhaseBreaks=ex.breaks||[];
  currentPhase=ex.phase||1;
  counterA=ex.cA||1;counterB=ex.cB||1;
  placedMur=new Set(ex.pm||[]);
  updatePhaseBadge();draw();
  document.getElementById('save-modal').classList.remove('show');
  toast('✓ Ejercicio cargado: '+ex.name);
}
function deleteExercise(i){
  const exercises=JSON.parse(localStorage.getItem('tb_exercises')||'[]');
  exercises.splice(i,1);
  localStorage.setItem('tb_exercises',JSON.stringify(exercises));
  renderSavedList();
}
function exportJSON(){
  const nombre=document.getElementById('save-name-input').value.trim()||'ejercicio';
  const ahora=new Date();
  const fecha=ahora.toLocaleDateString('es-AR').replace(/\//g,'-');
  const hora=ahora.toTimeString().slice(0,5).replace(':','h');
  const data={
    meta:{
      app:'Tablero Táctico FADEC',
      version:'3',
      ejercicio:nombre,
      fecha,
      hora,
      equipo:'Las Murciélagas'
    },
    players,arrows,manualPhaseBreaks,currentPhase,counterA,counterB
  };
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  // Nombre del archivo: nombre del ejercicio + fecha-hora para evitar colisiones
  const safeName=nombre.replace(/[^a-zA-Z0-9áéíóúÁÉÍÓÚñÑ\s-]/g,'').trim().replace(/\s+/g,'-');
  a.download=safeName+'-'+fecha+'-'+hora+'.json';
  a.click();
  URL.revokeObjectURL(url);
}
function importJSON(event){
  const file=event.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      saveHistory();
      players=data.players||[];arrows=data.arrows||[];
      manualPhaseBreaks=data.manualPhaseBreaks||[];
      currentPhase=data.currentPhase||1;
      counterA=data.counterA||1;counterB=data.counterB||1;
      updatePhaseBadge();draw();
      // Mostrar metadata si existe
      const meta=data.meta;
      if(meta){
        const info=meta.ejercicio+(meta.fecha?' · '+meta.fecha:'')+(meta.equipo?' · '+meta.equipo:'');
        toast('✓ '+info);
        // Prellenar el nombre en el input de guardado
        const inp=document.getElementById('save-name-input');
        if(inp&&meta.ejercicio) inp.value=meta.ejercicio;
      } else {
        toast('✓ Ejercicio importado');
      }
    }catch(err){toast('Error al importar el archivo');}
  };
  reader.readAsText(file);
}

// INTERACCIÓN
// =============================================
// Devuelve la posición efectiva de un jugador considerando flechas ANTERIORES a upTo.
// Si el jugador tiene una flecha de movimiento antes de upTo, devuelve ese destino.
function resolvedPos(idx, upTo){
  if(idx==null||!players[idx]) return {x:players[idx]?.x||0, y:players[idx]?.y||0};
  const limit = upTo!=null ? upTo : arrows.length;
  for(let ai=limit-1;ai>=0;ai--){
    const a=arrows[ai];
    if(a.from!==idx) continue;
    if(!MOVER_TYPES.has(a.type)&&!DRIBBLE_TYPES.has(a.type)) continue;
    if(a.kind==='curve')  return {x:a.x2, y:a.y2};
    if(a.kind==='free'&&a.path&&a.path.length>0)
      return {x:a.path[a.path.length-1].x, y:a.path[a.path.length-1].y};
    if(a.kind==='straight'){
      if(a.to!=null&&players[a.to]) return {x:players[a.to].x,y:players[a.to].y};
      if(a.toX!=null) return {x:a.toX,y:a.toY};
    }
  }
  return {x:players[idx].x, y:players[idx].y};
}

function getPlayerAt(x,y){
  // Primero buscar jugador real en su posición actual
  for(let i=players.length-1;i>=0;i--)
    if(Math.hypot(x-players[i].x,y-players[i].y)<=players[i].r+5)return i;
  // Luego buscar en destinos finales de cualquier flecha de movimiento (fantasma)
  for(let ai=arrows.length-1;ai>=0;ai--){
    const a=arrows[ai];
    if(a.from==null)continue;
    if(!MOVER_TYPES.has(a.type)&&!DRIBBLE_TYPES.has(a.type))continue;
    const p=players[a.from];if(!p)continue;
    let ex,ey;
    if(a.kind==='curve'){ ex=a.x2; ey=a.y2; }
    else if(a.kind==='free'&&a.path&&a.path.length>0){
      ex=a.path[a.path.length-1].x; ey=a.path[a.path.length-1].y;
    } else if(a.kind==='straight'){
      // Destino de carrera recta: punto toX/toY o posición del jugador destino
      if(a.toX!=null){ ex=a.toX; ey=a.toY; }
      else if(a.to!=null&&players[a.to]){ ex=players[a.to].x; ey=players[a.to].y; }
      else continue;
    } else continue;
    if(Math.hypot(x-ex,y-ey)<=p.r+8)return a.from;
  }
  return -1;
}
function addGhost(type,origin,x,y){
  if((type==='run'||type==='dribble'||type==='press')&&origin){
    players.push({x:Math.max(fx+20,Math.min(fx+fw-20,x)),y:Math.max(fy+20,Math.min(fy+fh-20,y)),
      team:origin.team,num:origin.num,role:origin.role,r:18,ghost:true,gk:origin.gk});
    return players.length-1;
  }return null;
}
function removePlayer(idx){
  saveHistory();const p=players[idx];
  if(p.murIdx!=null)placedMur.delete(p.murIdx);
  arrows=arrows.filter(a=>a.from!==idx&&a.to!==idx);
  arrows=arrows.map(a=>({...a,from:a.from>idx?a.from-1:a.from,to:a.to!=null?(a.to>idx?a.to-1:a.to):a.to}));
  players.splice(idx,1);if(arrowFrom===idx)arrowFrom=null;
  draw();toast('Jugadora eliminada');
}
function handleDown(x,y,isDouble){
  if(animRunning)return;
  if(isDouble){const idx=getPlayerAt(x,y);if(idx>=0){openEdit(idx);return;}}
  if(arrowMode&&drawMode==='free'){
    saveHistory();
    freeDrawing=true;freePath=[{x,y}];
    // Capturar jugador origen si el toque empieza sobre uno
    const fidx=getPlayerAt(x,y);
    arrowFrom=fidx>=0?fidx:null;
    return;
  }
  const idx=getPlayerAt(x,y);
  if(arrowMode){
    if(drawMode==='straight'){
      if(idx>=0){
        if(arrowFrom===null){arrowFrom=idx;status('Origen → tocá destino');}
        else if(arrowFrom!==idx){
          saveHistory();
          const ph=currentPhase;
          arrows.push({kind:'straight',from:arrowFrom,to:idx,type:arrowType,phase:ph});
          arrowFrom=null;status('Flecha agregada');
        }
      }else{
        if(arrowFrom!==null){
          saveHistory();const ph=currentPhase;
          const gi=addGhost(arrowType,players[arrowFrom],x,y);
          if(gi!=null)arrows.push({kind:'straight',from:arrowFrom,to:gi,type:arrowType,phase:ph});
          else arrows.push({kind:'straight',from:arrowFrom,toX:x,toY:y,type:arrowType,phase:ph});
          arrowFrom=null;status('Flecha agregada');
        }else arrowFrom=null;
      }
    }else if(drawMode==='curve'){
      if(curveStep===0){
        // Primer toque: origen — capturar jugador si hay uno ahí
        const cidx=getPlayerAt(x,y);
        arrowFrom=cidx>=0?cidx:null;
        curveP1={x,y};curveStep=1;status('Curva · tocá punto de control');
      } else if(curveStep===1){curveP2={x,y};curveStep=2;status('Curva · tocá punto final');}
      else{
        saveHistory();const ph=currentPhase;
        arrows.push({kind:'curve',from:arrowFrom,x1:curveP1.x,y1:curveP1.y,cx:curveP2.x,cy:curveP2.y,x2:x,y2:y,type:arrowType,phase:ph});
        curveStep=0;curveP1=null;curveP2=null;arrowFrom=null;status('Curva agregada');
      }
    }
    draw();return;
  }
  if(idx>=0){saveHistory();dragging=idx;dragOffX=players[idx].x-x;dragOffY=players[idx].y-y;}
}

canvas.addEventListener('mousedown',e=>{if(e.button===2)return;const{x,y}=getPos(e);handleDown(x,y,e.detail===2);});
canvas.addEventListener('mousemove',e=>{
  const{x,y}=getPos(e);
  if(arrowMode&&drawMode==='free'&&freeDrawing){freePath.push({x,y});draw();return;}
  if(dragging===null)return;
  players[dragging].x=Math.max(fx+20,Math.min(fx+fw-20,x+dragOffX));
  players[dragging].y=Math.max(fy+20,Math.min(fy+fh-20,y+dragOffY));draw();
});
canvas.addEventListener('mouseup',()=>{
  if(arrowMode&&drawMode==='free'&&freeDrawing){freeDrawing=false;if(freePath.length>2){const ph=currentPhase;arrows.push({kind:'free',from:arrowFrom,path:[...freePath],type:arrowType,phase:ph});}freePath=[];arrowFrom=null;draw();return;}
  dragging=null;
});
canvas.addEventListener('mouseleave',()=>{if(freeDrawing){freeDrawing=false;freePath=[];draw();};dragging=null;});
canvas.addEventListener('contextmenu',e=>{e.preventDefault();const{x,y}=getPos(e);const idx=getPlayerAt(x,y);if(idx>=0)removePlayer(idx);});
canvas.addEventListener('touchstart',e=>{
  e.preventDefault();const{x,y}=getPos(e);
  longPressTimer=setTimeout(()=>{const idx=getPlayerAt(x,y);if(idx>=0)removePlayer(idx);},700);
  if(arrowMode&&drawMode==='free'){
    saveHistory();
    freeDrawing=true;freePath=[{x,y}];
    // Capturar jugador origen si el toque empieza sobre uno
    const fidx=getPlayerAt(x,y);
    arrowFrom=fidx>=0?fidx:null;
    return;
  }
  const now=Date.now();const idx=getPlayerAt(x,y);
  const isDouble=(now-lastTap<350&&idx===lastTapIdx&&idx>=0);
  lastTap=now;lastTapIdx=idx;handleDown(x,y,isDouble);
},{passive:false});
canvas.addEventListener('touchmove',e=>{
  e.preventDefault();clearTimeout(longPressTimer);const{x,y}=getPos(e);
  if(arrowMode&&drawMode==='free'&&freeDrawing){freePath.push({x,y});draw();return;}
  if(dragging===null)return;
  players[dragging].x=Math.max(fx+20,Math.min(fx+fw-20,x+dragOffX));
  players[dragging].y=Math.max(fy+20,Math.min(fy+fh-20,y+dragOffY));draw();
},{passive:false});
canvas.addEventListener('touchend',e=>{
  e.preventDefault();clearTimeout(longPressTimer);
  if(arrowMode&&drawMode==='free'&&freeDrawing){freeDrawing=false;if(freePath.length>2){const ph=currentPhase;arrows.push({kind:'free',from:arrowFrom,path:[...freePath],type:arrowType,phase:ph});}freePath=[];arrowFrom=null;draw();return;}
  dragging=null;
},{passive:false});

// =============================================
// DIBUJO
// =============================================
function arrowColor(t){
  return {pass:'#6ec6f0',run:'#4fc3f7',press:'#e05c2a',shot:'#e53935',dribble:'#66bb6a'}[t]||'#6ec6f0';
}
function arrowDash(t){
  return {run:[8,5]}[t]||null;  // press ya tiene estilo propio (espinas)
}
function drawArrowHead(x2,y2,ux,uy,color){
  ctx.fillStyle=color;ctx.beginPath();
  ctx.moveTo(x2,y2);
  ctx.lineTo(x2-ux*14-uy*6,y2-uy*14+ux*6);
  ctx.lineTo(x2-ux*14+uy*6,y2-uy*14-ux*6);
  ctx.closePath();ctx.fill();
}
function drawArrow(x1,y1,x2,y2,color,dash,type){
  const dx=x2-x1,dy=y2-y1,len=Math.hypot(dx,dy);
  if(len<4) return;
  const ux=dx/len,uy=dy/len,ex=x2-ux*14,ey=y2-uy*14;
  ctx.save();ctx.lineCap='round';
  if(type==='shot'){
    const px=uy*2.5,py=-ux*2.5;
    ctx.strokeStyle='#e53935';ctx.lineWidth=3;
    ctx.beginPath();ctx.moveTo(x1+px,y1+py);ctx.lineTo(ex+px,ey+py);ctx.stroke();
    ctx.beginPath();ctx.moveTo(x1-px,y1-py);ctx.lineTo(ex-px,ey-py);ctx.stroke();
    ctx.fillStyle='#e53935';ctx.beginPath();
    ctx.moveTo(x2,y2);ctx.lineTo(x2-ux*16-uy*8,y2-uy*16+ux*8);ctx.lineTo(x2-ux*16+uy*8,y2-uy*16-ux*8);
    ctx.closePath();ctx.fill();
  } else if(type==='press'){
    // Línea base
    ctx.strokeStyle=color;ctx.lineWidth=2.5;
    ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(ex,ey);ctx.stroke();
    // Muescas perpendiculares (espinas) cada 18px
    ctx.lineWidth=2;
    const step=18, spineLen=7;
    for(let d=step;d<len-14;d+=step){
      const mx=x1+ux*d, my=y1+uy*d;
      // Muesca hacia la izquierda del trazo
      ctx.beginPath();
      ctx.moveTo(mx, my);
      ctx.lineTo(mx-uy*spineLen-ux*spineLen*0.5, my+ux*spineLen-uy*spineLen*0.5);
      ctx.stroke();
    }
    drawArrowHead(x2,y2,ux,uy,color);
  } else {
    ctx.strokeStyle=color;ctx.lineWidth=3.5;
    if(dash)ctx.setLineDash(dash);
    ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(ex,ey);ctx.stroke();
    ctx.setLineDash([]);
    drawArrowHead(x2,y2,ux,uy,color);
    if(type==='dribble'){
      const mx=(x1+x2)/2,my=(y1+y2)/2;
      ctx.fillStyle='#fff';ctx.strokeStyle=color;ctx.lineWidth=1.5;
      ctx.beginPath();ctx.arc(mx,my,5,0,Math.PI*2);ctx.fill();ctx.stroke();
    }
  }
  ctx.restore();
}
function drawCurveArrow(x1,y1,cxp,cyp,x2,y2,color,dash,type){
  const dx=x2-cxp,dy=y2-cyp,len=Math.hypot(dx,dy);
  if(len<2) return;
  const ux=dx/len,uy=dy/len;
  ctx.save();ctx.strokeStyle=color;ctx.lineWidth=2.5;ctx.lineCap='round';
  if(dash)ctx.setLineDash(dash);
  ctx.beginPath();ctx.moveTo(x1,y1);ctx.quadraticCurveTo(cxp,cyp,x2,y2);ctx.stroke();
  ctx.setLineDash([]);
  if(type==='shot'){
    ctx.fillStyle='#e53935';ctx.beginPath();
    ctx.moveTo(x2,y2);ctx.lineTo(x2-ux*16-uy*8,y2-uy*16+ux*8);ctx.lineTo(x2-ux*16+uy*8,y2-uy*16-ux*8);
    ctx.closePath();ctx.fill();
  } else drawArrowHead(x2,y2,ux,uy,color);
  ctx.restore();
}
function drawFreeArrowFromPlayer(px,py,path,color,dash,type){
  // Igual que drawFreeArrow pero arranca desde la posición del jugador
  if(!path||path.length<1) return;
  const fullPath=[{x:px,y:py},...path];
  drawFreeArrow(fullPath,color,dash,type);
}
function drawFreeArrow(path,color,dash,type){
  if(path.length<2) return;
  ctx.save();ctx.strokeStyle=color;ctx.lineWidth=2.5;ctx.lineCap='round';ctx.lineJoin='round';
  if(dash)ctx.setLineDash(dash);
  ctx.beginPath();path.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));
  ctx.stroke();ctx.setLineDash([]);
  const last=path[path.length-1],prev=path[path.length-2];
  const dx=last.x-prev.x,dy=last.y-prev.y,len=Math.hypot(dx,dy);
  if(len>2) drawArrowHead(last.x,last.y,dx/len,dy/len,color);
  ctx.restore();
}

// Dibujar indicador de fase sobre flecha
function drawPhaseLabel(x,y,phase){
  const opacities=[1,0.7,0.5];
  const op=opacities[Math.min(phase-1,2)];
  ctx.save();ctx.globalAlpha=op*0.85;
  ctx.fillStyle='rgba(26,58,92,0.9)';
  ctx.beginPath();ctx.arc(x,y,9,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';ctx.font="bold 9px 'Barlow Condensed',sans-serif";
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('F'+phase,x,y+0.5);
  ctx.globalAlpha=1;ctx.restore();
}

function drawPlayerGhost(p, px, py){
  // Dibuja un jugador semitransparente en la posición de destino
  const isA=p.team==='A';
  const fillC=p.gk?(isA?'#fff9c4':'#c8f0c8'):(isA?'#e8f4ff':'#0d1f3c');
  const strokeC=p.gk?(isA?'#f9a825':'#2e7d32'):(isA?'#4a9fd4':'#1a2a4a');
  const textC=p.gk?(isA?'#5a3a00':'#1a3a1a'):(isA?'#1a3a5c':'#ffffff');
  ctx.save();ctx.globalAlpha=0.40;
  if(p.gk){
    const s=p.r*1.35;
    ctx.fillStyle=fillC;ctx.beginPath();ctx.roundRect(px-s/2,py-s/2,s,s,6);ctx.fill();
    ctx.strokeStyle=strokeC;ctx.lineWidth=1.5;ctx.setLineDash([4,3]);
    ctx.beginPath();ctx.roundRect(px-s/2,py-s/2,s,s,6);ctx.stroke();
  } else {
    ctx.fillStyle=fillC;ctx.beginPath();ctx.arc(px,py,p.r,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle=strokeC;ctx.lineWidth=1.5;ctx.setLineDash([4,3]);
    ctx.beginPath();ctx.arc(px,py,p.r,0,Math.PI*2);ctx.stroke();
  }
  ctx.setLineDash([]);
  ctx.fillStyle=textC;
  ctx.save();ctx.translate(px,py);ctx.rotate(-Math.PI/2);
  ctx.font="bold 12px 'Barlow Condensed',sans-serif";
  ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(p.num,0,0);
  ctx.restore();
  ctx.restore();
}

function drawField(){
  ctx.fillStyle='#040c14';ctx.fillRect(0,0,IW,IH);
  // Tablones
  ctx.fillStyle='#17501f';
  ctx.fillRect(fx,fy-18,fw,18);ctx.fillRect(fx,fy+fh,fw,18);
  ctx.fillStyle='#112d18';
  ctx.fillRect(fx-18,fy-18,18,fh+36);ctx.fillRect(fx+fw,fy-18,18,fh+36);
  // Franjas
  const sw=38;
  for(let i=0;i*sw<fw;i++){
    ctx.fillStyle=i%2===0?'#1e5c30':'#196028';
    ctx.fillRect(fx+i*sw,fy,sw,fh);
    const g=ctx.createLinearGradient(fx+i*sw,fy,fx+i*sw+sw,fy);
    const a=i%2===0;
    g.addColorStop(0,a?'rgba(255,255,255,0.03)':'rgba(0,0,0,0.04)');
    g.addColorStop(.5,a?'rgba(255,255,255,0.09)':'rgba(0,0,0,0.08)');
    g.addColorStop(1,a?'rgba(255,255,255,0.03)':'rgba(0,0,0,0.04)');
    ctx.fillStyle=g;ctx.fillRect(fx+i*sw,fy,sw,fh);
  }
  const LN='rgba(255,255,255,0.93)';ctx.strokeStyle=LN;
  ctx.lineWidth=3;ctx.strokeRect(fx,fy,fw,fh);
  ctx.beginPath();ctx.moveTo(fcx,fy);ctx.lineTo(fcx,fy+fh);ctx.stroke();
  ctx.setLineDash([11,7]);ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(fx+mH*12,fy);ctx.lineTo(fx+mH*12,fy+fh);ctx.stroke();
  ctx.beginPath();ctx.moveTo(fx+fw-mH*12,fy);ctx.lineTo(fx+fw-mH*12,fy+fh);ctx.stroke();
  ctx.setLineDash([]);
  ctx.lineWidth=3;ctx.beginPath();ctx.arc(fcx,fcy,mH*5,0,Math.PI*2);ctx.stroke();
  ctx.fillStyle=LN;ctx.beginPath();ctx.arc(fcx,fcy,4,0,Math.PI*2);ctx.fill();

  [fx,fx+fw].forEach((ax,si)=>{
    const sign=si===0?1:-1;
    const r=mH*6,offY=mV*1.58;
    const topCy=fcy-offY,botCy=fcy+offY;
    const gW=mH*1.5,gH=mV*3.66,goSemiH=mV*2.91,goDepth=mH*2;
    ctx.strokeStyle=LN;ctx.lineWidth=2.5;
    ctx.beginPath();ctx.arc(ax,topCy,r,Math.atan2(-r,0),Math.atan2(0,sign*r),sign<0);ctx.stroke();
    ctx.beginPath();ctx.arc(ax,botCy,r,Math.atan2(0,sign*r),Math.atan2(r,0),sign<0);ctx.stroke();
    ctx.beginPath();ctx.moveTo(ax+sign*r,topCy);ctx.lineTo(ax+sign*r,botCy);ctx.stroke();
    ctx.beginPath();ctx.moveTo(ax,topCy-r);ctx.lineTo(ax,fy);ctx.stroke();
    ctx.beginPath();ctx.moveTo(ax,botCy+r);ctx.lineTo(ax,fy+fh);ctx.stroke();
    ctx.lineWidth=2;ctx.strokeRect(ax,fcy-goSemiH,sign*goDepth,goSemiH*2);
    ctx.fillStyle=LN;
    ctx.beginPath();ctx.arc(ax+sign*mH*6,fcy,4,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(ax+sign*mH*8,fcy,4,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#0d2b14';ctx.strokeStyle=LN;ctx.lineWidth=2.5;
    if(sign>0){ctx.fillRect(ax-gW,fcy-gH/2,gW,gH);ctx.strokeRect(ax-gW,fcy-gH/2,gW,gH);}
    else{ctx.fillRect(ax,fcy-gH/2,gW,gH);ctx.strokeRect(ax,fcy-gH/2,gW,gH);}
    const netX=sign>0?ax-gW:ax,netY=fcy-gH/2;
    ctx.save();ctx.beginPath();ctx.rect(netX,netY,gW,gH);ctx.clip();
    ctx.strokeStyle='rgba(255,255,255,0.45)';ctx.lineWidth=0.5;
    for(let x=netX;x<=netX+gW;x+=4){ctx.beginPath();ctx.moveTo(x,netY);ctx.lineTo(x,netY+gH);ctx.stroke();}
    for(let y=netY;y<=netY+gH;y+=4){ctx.beginPath();ctx.moveTo(netX,y);ctx.lineTo(netX+gW,y);ctx.stroke();}
    ctx.restore();
    ctx.save();ctx.setLineDash([5,3]);ctx.lineWidth=1.5;ctx.strokeStyle=LN;
    if(sign>0)ctx.strokeRect(ax-goDepth,fcy-goSemiH,goDepth,goSemiH*2);
    else ctx.strokeRect(ax,fcy-goSemiH,goDepth,goSemiH*2);
    ctx.setLineDash([]);ctx.restore();
  });

  ctx.strokeStyle=LN;ctx.lineWidth=2;
  [[fx,fy,0,Math.PI/2],[fx+fw,fy,Math.PI/2,Math.PI],[fx,fy+fh,-Math.PI/2,0],[fx+fw,fy+fh,Math.PI,3*Math.PI/2]]
    .forEach(([x,y,sa,ea])=>{ctx.beginPath();ctx.arc(x,y,8,sa,ea);ctx.stroke();});

  const d5=mH*5,mk=7;
  [[fx,fy,1,1],[fx+fw,fy,-1,1],[fx,fy+fh,1,-1],[fx+fw,fy+fh,-1,-1]].forEach(([x,y,sx,sy])=>{
    ctx.beginPath();ctx.moveTo(x+sx*d5,y);ctx.lineTo(x+sx*d5,y+sy*mk);ctx.stroke();
    ctx.beginPath();ctx.moveTo(x,y+sy*d5);ctx.lineTo(x+sx*mk,y+sy*d5);ctx.stroke();
  });

  [[fx,fy-18,55,18],[fx+fw-55,fy-18,55,18],[fx,fy+fh,55,18],[fx+fw-55,fy+fh,55,18]].forEach(([x,y,w,h])=>{
    ctx.save();ctx.beginPath();ctx.rect(x,y,w,h);ctx.clip();
    ctx.strokeStyle='rgba(255,255,255,0.25)';ctx.lineWidth=1;
    for(let i=-h;i<w+h;i+=5){ctx.beginPath();ctx.moveTo(x+i,y);ctx.lineTo(x+i+h,y+h);ctx.stroke();}
    ctx.restore();
  });
}

function draw(animOverride){
  // animOverride: {positions:[...]} para animación
  const pos=animOverride?animOverride.positions:null;
  if(!pos) updatePhaseBadge();
  drawField();

  // Flechas con opacidad por fase
  const phaseOpacity=[1,0.7,0.5];
  arrows.forEach((a,ai)=>{
    const ph=computePhase(arrows,ai);
    const op=phaseOpacity[Math.min(ph-1,2)];
    ctx.save();ctx.globalAlpha=op;
    const color=arrowColor(a.type),dash=arrowDash(a.type);
    let mx=0,my=0; // para label
    if(a.kind==='curve'){
      const cfp=a.from!=null?resolvedPos(a.from,ai):null;
      const cx1=cfp?cfp.x:a.x1, cy1=cfp?cfp.y:a.y1;
      drawCurveArrow(cx1,cy1,a.cx,a.cy,a.x2,a.y2,color,dash,a.type);
      mx=(cx1+a.cx+a.x2)/3;my=(cy1+a.cy+a.y2)/3;
      // Jugador fantasma en destino final
      if(cfp&&(MOVER_TYPES.has(a.type)||DRIBBLE_TYPES.has(a.type))&&players[a.from]) drawPlayerGhost(players[a.from],a.x2,a.y2);
    } else if(a.kind==='free'){
      const ffp=a.from!=null?resolvedPos(a.from,ai):null;
      if(a.path&&a.path.length>1){
        if(ffp){
          drawFreeArrowFromPlayer(ffp.x,ffp.y,a.path,color,dash,a.type);
          // Jugador fantasma en destino final
          const last=a.path[a.path.length-1];
          if((MOVER_TYPES.has(a.type)||DRIBBLE_TYPES.has(a.type))&&players[a.from]) drawPlayerGhost(players[a.from],last.x,last.y);
        } else {
          drawFreeArrow(a.path,color,dash,a.type);
        }
        const mid=Math.floor(a.path.length/2);mx=a.path[mid].x;my=a.path[mid].y;
      }
    } else {
      // Recta: coordenadas desde resolvedPos (último destino del jugador), radio del jugador real
      const pFrom=players[a.from];if(!pFrom){ctx.restore();return;}
      const fpCoords=pos?{x:pos[a.from].x,y:pos[a.from].y}:resolvedPos(a.from,ai);
      if(!fpCoords){ctx.restore();return;}
      const r=pFrom.r||18;
      if(a.to!=null){
        const tp=pos?{x:pos[a.to].x,y:pos[a.to].y}:players[a.to];if(!tp){ctx.restore();return;}
        const dist=Math.hypot(tp.x-fpCoords.x,tp.y-fpCoords.y)||1;
        drawArrow(fpCoords.x+(tp.x-fpCoords.x)*r/dist,fpCoords.y+(tp.y-fpCoords.y)*r/dist,tp.x,tp.y,color,dash,a.type);
        mx=(fpCoords.x+tp.x)/2;my=(fpCoords.y+tp.y)/2;
        // Fantasma en destino si es carrera (jugador se mueve)
        if(!pos&&(MOVER_TYPES.has(a.type)||DRIBBLE_TYPES.has(a.type))&&players[a.from])
          drawPlayerGhost(players[a.from],tp.x,tp.y);
      } else if(a.toX!=null){
        drawArrow(fpCoords.x,fpCoords.y,a.toX,a.toY,color,dash,a.type);
        mx=(fpCoords.x+a.toX)/2;my=(fpCoords.y+a.toY)/2;
        // Fantasma en destino si es carrera a punto libre
        if(!pos&&(MOVER_TYPES.has(a.type)||DRIBBLE_TYPES.has(a.type))&&players[a.from])
          drawPlayerGhost(players[a.from],a.toX,a.toY);
      }
    }
    ctx.restore();
    // Label de fase
    if(getMaxPhase()>1) drawPhaseLabel(mx,my,ph);
  });

  // Preview curva
  if(arrowMode&&drawMode==='curve'&&curveStep>0&&curveP1){
    ctx.save();ctx.strokeStyle='rgba(110,198,240,0.4)';ctx.lineWidth=1.5;ctx.setLineDash([4,4]);
    ctx.beginPath();ctx.arc(curveP1.x,curveP1.y,6,0,Math.PI*2);ctx.stroke();
    if(curveStep===2&&curveP2){
      ctx.beginPath();ctx.arc(curveP2.x,curveP2.y,5,0,Math.PI*2);ctx.stroke();
      ctx.beginPath();ctx.moveTo(curveP1.x,curveP1.y);ctx.lineTo(curveP2.x,curveP2.y);ctx.stroke();
    }
    ctx.setLineDash([]);ctx.restore();
  }

  // Origen seleccionado para flecha
  if(arrowFrom!==null&&players[arrowFrom]){
    const p=players[arrowFrom];
    ctx.save();ctx.strokeStyle='rgba(110,198,240,0.8)';ctx.lineWidth=2;ctx.setLineDash([4,3]);
    ctx.beginPath();ctx.arc(p.x,p.y,p.r+6,0,Math.PI*2);ctx.stroke();
    ctx.setLineDash([]);ctx.restore();
  }

  // Jugadoras
  const drawPos=pos||players.map(p=>p);
  [false,true].forEach(showGhost=>{
    players.forEach((p,i)=>{
      if(!!p.ghost!==showGhost) return;
      const px=pos?pos[i].x:p.x;
      const py=pos?pos[i].y:p.y;
      const isA=p.team==='A';
      const fillC=p.gk?(isA?'#fff9c4':'#c8f0c8'):(isA?'#e8f4ff':'#0d1f3c');
      const strokeC=p.gk?(isA?'#f9a825':'#2e7d32'):(isA?'#4a9fd4':'#1a2a4a');
      const textC=p.gk?(isA?'#5a3a00':'#1a3a1a'):(isA?'#1a3a5c':'#ffffff');
      ctx.save();
      if(p.ghost) ctx.globalAlpha=0.42;
      if(p.gk){
        const s=p.r*1.35;
        if(!p.ghost){ctx.shadowColor='rgba(0,0,0,0.5)';ctx.shadowBlur=6;ctx.shadowOffsetY=2;}
        ctx.fillStyle=fillC;ctx.beginPath();ctx.roundRect(px-s/2,py-s/2,s,s,6);ctx.fill();
        ctx.shadowBlur=0;ctx.strokeStyle=strokeC;ctx.lineWidth=p.ghost?2:2.5;
        if(p.ghost)ctx.setLineDash([4,3]);
        ctx.beginPath();ctx.roundRect(px-s/2,py-s/2,s,s,6);ctx.stroke();ctx.setLineDash([]);
      } else {
        if(!p.ghost){ctx.shadowColor='rgba(0,0,0,0.5)';ctx.shadowBlur=6;ctx.shadowOffsetY=2;}
        ctx.fillStyle=fillC;ctx.beginPath();ctx.arc(px,py,p.r,0,Math.PI*2);ctx.fill();
        ctx.shadowBlur=0;ctx.strokeStyle=strokeC;ctx.lineWidth=p.ghost?2:2.5;
        if(p.ghost)ctx.setLineDash([4,3]);
        ctx.beginPath();ctx.arc(px,py,p.r,0,Math.PI*2);ctx.stroke();ctx.setLineDash([]);
      }
      ctx.save();ctx.translate(px,py);ctx.rotate(-Math.PI/2);
      ctx.fillStyle=textC;ctx.font="bold 15px 'Barlow Condensed', sans-serif";
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(p.num,0,0);
      if(p.role&&p.role!==String(p.num)){
        const short=p.role.split(',')[0].split(' ')[0].substring(0,8);
        ctx.fillStyle=isA?'rgba(139,37,0,0.8)':'rgba(13,58,110,0.8)';
        ctx.font="500 9px 'Barlow', sans-serif";ctx.fillText(short,0,11);
      }
      ctx.restore();
      if(arrowFrom===i){
        ctx.strokeStyle='rgba(74,159,212,0.9)';ctx.lineWidth=2;ctx.setLineDash([3,3]);
        ctx.beginPath();ctx.arc(px,py,p.r+5,0,Math.PI*2);ctx.stroke();ctx.setLineDash([]);
      }
      ctx.restore();
    });
  });
}

// =============================================
// ANIMACIÓN AUTOMÁTICA
// =============================================
const ANIM_BASE_MS = 2000;
const ANIM_PAUSE_MS = 700;
let animSpeedMult = 2; // default lenta

const MOVER_TYPES   = new Set(['run','press']);
const DRIBBLE_TYPES = new Set(['dribble']);
const BALL_TYPES    = new Set(['pass','shot']);

let ballState = null;        // {x,y} pelota entre fases
let lastBallReceiver = null; // playerIdx que recibió la pelota al final de la fase anterior
let ghostTrails = new Map(); // playerIdx → [{x,y},...] posiciones anteriores acumuladas

// ── Geometría ──
function pointOnSegment(sx,sy,tx,ty,t){ return {x:sx+(tx-sx)*t, y:sy+(ty-sy)*t}; }
function pointOnQuad(x1,y1,cx,cy,x2,y2,t){
  const m=1-t;
  return {x:m*m*x1+2*m*t*cx+t*t*x2, y:m*m*y1+2*m*t*cy+t*t*y2};
}
function pointOnPath(path,t){
  if(path.length<2) return path[0]||{x:0,y:0};
  if(t>=1) return {x:path[path.length-1].x, y:path[path.length-1].y};
  const total=path.length-1;
  const fi=t*total;
  const i=Math.min(Math.floor(fi),total-1), f=fi-i;
  const p0=path[i], p1=path[i+1];
  return {x:p0.x+(p1.x-p0.x)*f, y:p0.y+(p1.y-p0.y)*f};
}
function dirOnSegment(sx,sy,tx,ty){
  const dx=tx-sx,dy=ty-sy,len=Math.hypot(dx,dy)||1;
  return {x:dx/len,y:dy/len};
}
function dirOnQuad(x1,y1,cx,cy,x2,y2,t){
  const m=1-t,dx=2*m*(cx-x1)+2*t*(x2-cx),dy=2*m*(cy-y1)+2*t*(y2-cy),len=Math.hypot(dx,dy)||1;
  return {x:dx/len,y:dy/len};
}
function dirOnPath(path,t){
  const total=path.length-1;
  const fi=Math.min(t*total,total-0.001);
  const i=Math.floor(fi);
  const p0=path[i],p1=path[Math.min(i+1,total)];
  const dx=p1.x-p0.x,dy=p1.y-p0.y,len=Math.hypot(dx,dy)||1;
  return {x:dx/len,y:dy/len};
}

// ── Construir segmentos de una fase ──
function buildSegments(phArrows){
  const segs = phArrows.map(item=>{
    const a=item.a;
    const fromIdx = a.from!=null ? a.from : null;
    // fp = posición actual del jugador original (no-ghost) con mismo team:num
    // El jugador original (índice más bajo, no-ghost) siempre tiene animPositions actualizado
    let fp = null;
    if(fromIdx!=null){
      const _fp=players[fromIdx];
      if(_fp){
        // Buscar el jugador ORIGINAL (no-ghost) con el mismo team:num
        const origIdx=players.findIndex(pl=>!pl.ghost&&pl.team===_fp.team&&pl.num===_fp.num);
        if(origIdx>=0&&animPositions[origIdx]){
          fp=animPositions[origIdx];
        } else if(animPositions[fromIdx]){
          fp=animPositions[fromIdx];
        }
      } else if(animPositions[fromIdx]){
        fp=animPositions[fromIdx];
      }
    }

    let toIdx=null,tx,ty;
    if(a.to!=null && animPositions[a.to]){ toIdx=a.to; tx=players[a.to].x; ty=players[a.to].y; }
    else if(a.toX!=null){ tx=a.toX; ty=a.toY; }
    else if(fp){ tx=fp.x; ty=fp.y; }
    else { tx=0; ty=0; }

    let geom,sx,sy,x1,y1,cx,cy,x2,y2,path;
    if(a.kind==='straight'){
      geom='seg'; sx=fp?fp.x:tx; sy=fp?fp.y:ty;
    } else if(a.kind==='curve'){
      // Coordenadas absolutas del canvas — NO desplazar
      geom='quad';
      x1=a.x1; y1=a.y1; cx=a.cx; cy=a.cy; x2=a.x2; y2=a.y2;
      sx=fp?fp.x:x1; sy=fp?fp.y:y1;  // origen = jugador actual
      tx=x2; ty=y2;                    // destino = punto final absoluto
    } else if(a.kind==='free'){
      // Coordenadas absolutas del canvas — NO desplazar
      geom='path'; path=a.path||[];
      sx=fp?fp.x:(path.length>0?path[0].x:0);
      sy=fp?fp.y:(path.length>0?path[0].y:0);
      tx=path.length>0?path[path.length-1].x:sx;
      ty=path.length>0?path[path.length-1].y:sy;
    }

    const kind = MOVER_TYPES.has(a.type)?'move'
               : DRIBBLE_TYPES.has(a.type)?'dribble'
               : a.type==='shot'?'shot':'ball';

    return {arrowIdx:item.i,a,fromIdx,toIdx,kind,geom,sx,sy,tx,ty,x1,y1,cx,cy,x2,y2,path,ballIn:false,ballOut:false};
  });

  // Detectar cadena de pelota (dentro de la fase y desde fase anterior)
  for(let i=0;i<segs.length;i++){
    const s=segs[i];
    const hasBall = s.kind==='ball'||s.kind==='dribble'||s.kind==='shot';
    if(!hasBall) continue;
    if(i===0){
      // Recibe pelota si: viene de fase anterior Y el receptor coincide con el from
      s.ballIn = (ballState!==null && s.fromIdx!=null && s.fromIdx===lastBallReceiver);
    } else {
      const prev=segs[i-1];
      const prevBall = prev.kind==='ball'||prev.kind==='dribble'||prev.kind==='shot';
      // Cadena directa en esta fase
      const directChain = prevBall && prev.toIdx!=null && prev.toIdx===s.fromIdx;
      // O: fase anterior terminó con pelota en el mismo jugador
      const fromPrevPhase = (ballState!==null && s.fromIdx!=null && s.fromIdx===lastBallReceiver && i===0);
      s.ballIn = directChain || fromPrevPhase;
    }
    s.ballOut=true;
  }
  return segs;
}

// ── Posición pelota en segmento ──
function ballPos(seg,t){
  if(seg.geom==='seg')  return pointOnSegment(seg.sx,seg.sy,seg.tx,seg.ty,t);
  if(seg.geom==='quad') return pointOnQuad(seg.x1,seg.y1,seg.cx,seg.cy,seg.x2,seg.y2,t);
  if(seg.geom==='path') return pointOnPath(seg.path,t);
  return {x:seg.tx,y:seg.ty};
}
function ballDir(seg,t,playerPos){
  // playerPos: posición actual del jugador (para dribble curvo/libre)
  const ox=playerPos?playerPos.x:seg.sx;
  const oy=playerPos?playerPos.y:seg.sy;
  if(seg.geom==='seg')  return dirOnSegment(ox,oy,seg.tx,seg.ty);
  if(seg.geom==='quad') return dirOnQuad(ox,oy,seg.cx,seg.cy,seg.x2,seg.y2,t);
  if(seg.geom==='path'){
    // Construir fullPath con jugador como primer punto
    const fp=[{x:ox,y:oy},...seg.path];
    return dirOnPath(fp,t);
  }
  return {x:1,y:0};
}

// ── Dibujar pelota ──
function drawBall(x,y,type,flash){
  const isShot=type==='shot';
  const r=isShot?9:6;
  ctx.save();
  if(flash>0){
    ctx.globalAlpha=(1-flash)*0.55;
    ctx.strokeStyle='#e53935';ctx.lineWidth=3;
    ctx.beginPath();ctx.arc(x,y,r+flash*22,0,Math.PI*2);ctx.stroke();
    ctx.globalAlpha=1;
  }
  ctx.fillStyle=isShot?'#e53935':'#fff';
  ctx.strokeStyle=isShot?'#b71c1c':'#4a9fd4';
  ctx.lineWidth=isShot?2.5:2;
  ctx.shadowColor=isShot?'rgba(229,57,53,0.7)':'rgba(255,255,255,0.5)';
  ctx.shadowBlur=isShot?10:5;
  ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();ctx.stroke();
  ctx.restore();
}

// ── Trayectoria parcial ──
function drawPartialTrail(seg,ease,color,moverStart){
  const ox=moverStart?moverStart.x:seg.sx;
  const oy=moverStart?moverStart.y:seg.sy;
  ctx.save();ctx.globalAlpha=0.45;ctx.strokeStyle=color;ctx.lineWidth=3;ctx.lineCap='round';
  const dsh=arrowDash(seg.a.type);if(dsh)ctx.setLineDash(dsh);
  if(seg.geom==='seg'){
    const ep=pointOnSegment(ox,oy,seg.tx,seg.ty,ease);
    ctx.beginPath();ctx.moveTo(ox,oy);ctx.lineTo(ep.x,ep.y);ctx.stroke();
  } else if(seg.geom==='quad'){
    // Curva con origen en jugador, punto de control y destino absolutos
    const steps=24;ctx.beginPath();ctx.moveTo(ox,oy);
    for(let s=1;s<=steps;s++){
      const st=ease*s/steps;
      const p=pointOnQuad(ox,oy,seg.cx,seg.cy,seg.x2,seg.y2,st);
      ctx.lineTo(p.x,p.y);
    }
    ctx.stroke();
  } else if(seg.geom==='path'&&seg.path){
    // Path con jugador como primer punto
    const fullPath=[{x:ox,y:oy},...seg.path];
    const total=fullPath.length-1;
    const upTo=Math.min(Math.floor(ease*total),total);
    ctx.beginPath();
    fullPath.slice(0,upTo+1).forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));
    ctx.stroke();
  }
  ctx.setLineDash([]);ctx.restore();
}

// ── Motor principal ──
function realPlayerKey(playerIdx){
  // Si el jugador es un ghost, lo identificamos por equipo+número (el jugador real)
  // para que sus acciones se agrupen correctamente con las del original
  if(playerIdx==null) return null;
  const p=players[playerIdx];
  if(!p) return playerIdx;
  // Usar team+num como clave única del jugador real
  return p.team+':'+p.num;
}

function buildAutoAnimationGroups(arrows){
  const actionCountByPlayer = new Map(); // key → cantidad de acciones ya asignadas
  const minGroupByBallDep   = new Map(); // key → grupo mínimo por dependencia de pelota
  const groups = [];

  arrows.forEach((arrow, index) => {
    const playerIdx = arrow.from;

    if (playerIdx == null){
      if (!groups[0]) groups[0] = [];
      groups[0].push({a: arrow, i: index});
      return;
    }

    const key = realPlayerKey(playerIdx);

    // Grupo base por cantidad de acciones previas del mismo jugador
    const previousCount = actionCountByPlayer.get(key) || 0;

    // Grupo mínimo por dependencia de pelota:
    // si este jugador es receptor de un pase en un grupo anterior,
    // no puede actuar antes de que ese pase llegue (grupo del pase + 1)
    const depMin = minGroupByBallDep.get(key) || 0;

    const groupIndex = Math.max(previousCount, depMin);

    if (!groups[groupIndex]) groups[groupIndex] = [];
    groups[groupIndex].push({a: arrow, i: index});

    actionCountByPlayer.set(key, groupIndex + 1);

    // Si esta flecha es un pase/disparo con destino a otro jugador,
    // ese jugador no puede actuar antes del grupo siguiente
    if ((arrow.type === 'pass' || arrow.type === 'shot') && arrow.to != null){
      const receiverKey = realPlayerKey(arrow.to);
      const currentMin = minGroupByBallDep.get(receiverKey) || 0;
      minGroupByBallDep.set(receiverKey, Math.max(currentMin, groupIndex + 1));
    }
  });

  return groups.filter(group => group && group.length > 0);
}

function startAnimation(){
  if(arrows.length===0){toast('Agregá flechas primero');return;}
  animRunning=true;animPaused=false;ballState=null;lastBallReceiver=null;ghostTrails=new Map();
  document.getElementById('anim-bar').style.display='flex';
  document.getElementById('btn-play').textContent='⏸ Pausa';
  animPositions=players.map(p=>({x:p.x,y:p.y}));
  resolvedGroups.length=0;

  // Construir grupos automáticos: primera acción de cada jugador → Grupo 0, segunda → Grupo 1, etc.
  const autoGroups=buildAutoAnimationGroups(arrows);

  startRecording();

  status('Animando '+autoGroups.length+' grupo'+(autoGroups.length>1?'s':''));
  runAutoGroup(autoGroups, 0);
}

let phaseTimer=null;

// runPhase eliminado — se usa runAutoGroup

function drawAnimPlayersGroup(group,moverStarts,pos){
  // Mapa de movers activos en este grupo: fromIdx → moverStart
  const moverMap=new Map();
  group.forEach((seg,gi)=>{
    if((seg.kind==='move'||seg.kind==='dribble')&&seg.fromIdx!=null&&moverStarts[gi]){
      moverMap.set(seg.fromIdx, moverStarts[gi]);
    }
  });

  function drawOne(px,py,p,alpha,dashed){
    const isA=p.team==='A';
    const fillC=p.gk?(isA?'#fff9c4':'#c8f0c8'):(isA?'#e8f4ff':'#0d1f3c');
    const strokeC=p.gk?(isA?'#f9a825':'#2e7d32'):(isA?'#4a9fd4':'#1a2a4a');
    const textC=p.gk?(isA?'#5a3a00':'#1a3a1a'):(isA?'#1a3a5c':'#ffffff');
    ctx.save();ctx.globalAlpha=alpha;
    if(p.gk){
      const s=p.r*1.35;
      ctx.fillStyle=fillC;ctx.beginPath();ctx.roundRect(px-s/2,py-s/2,s,s,6);ctx.fill();
      ctx.strokeStyle=strokeC;ctx.lineWidth=dashed?1.5:2.5;
      if(dashed)ctx.setLineDash([4,3]);
      ctx.beginPath();ctx.roundRect(px-s/2,py-s/2,s,s,6);ctx.stroke();ctx.setLineDash([]);
    } else {
      ctx.fillStyle=fillC;ctx.beginPath();ctx.arc(px,py,p.r,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle=strokeC;ctx.lineWidth=dashed?1.5:2.5;
      if(dashed)ctx.setLineDash([4,3]);
      ctx.beginPath();ctx.arc(px,py,p.r,0,Math.PI*2);ctx.stroke();ctx.setLineDash([]);
    }
    // Número siempre visible (con el alpha del contexto), vertical
    ctx.save();ctx.translate(px,py);ctx.rotate(-Math.PI/2);
    ctx.fillStyle=textC;
    ctx.font=dashed?"bold 12px 'Barlow Condensed',sans-serif":"bold 15px 'Barlow Condensed',sans-serif";
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(p.num,0,0);
    ctx.restore();
    ctx.restore();
  }

  // Mapa team:num → moverStart del grupo actual
  const moverByKey=new Map();
  moverMap.forEach((ms,idx)=>{
    const p=players[idx];
    if(p){ moverByKey.set(p.team+':'+p.num, ms); }
  });

  // 1. Estela: ghostTrails con clave team:num
  players.forEach((p,i)=>{
    if(p.ghost)return;
    const key=p.team+':'+p.num;
    const trail=ghostTrails.get(key);
    if(!trail||!trail.length)return;
    trail.forEach((pt,ti)=>{
      const alpha=Math.max(0.08, 0.30-(trail.length-1-ti)*0.08);
      drawOne(pt.x,pt.y,p,alpha,true);
    });
  });

  // 2. Jugadoras originales en posición animada actual (pos[origIdx] siempre actualizado)
  players.forEach((p,i)=>{
    if(p.ghost)return;
    const key=p.team+':'+p.num;
    const cur=pos[i]||{x:p.x,y:p.y};
    if(moverByKey.has(key)){
      const ms=moverByKey.get(key);
      drawOne(ms.x,ms.y,p,0.30,true);
      drawOne(cur.x,cur.y,p,1,false);
    } else {
      drawOne(cur.x,cur.y,p,1,false);
    }
  });
}

const resolvedGroups=[];  // segmentos ya resueltos de cada grupo anterior

function runAutoGroup(autoGroups, groupIdx){
  if(!animRunning || groupIdx >= autoGroups.length){
    onAnimEnd();
    return;
  }


  // Reconstruir segmentos con animPositions actual (posiciones correctas en este momento)
  const group = buildSegments(autoGroups[groupIdx]);
  resolvedGroups[groupIdx] = group;  // guardar para dibujar como "anterior" después


  const dur = ANIM_BASE_MS * animSpeedMult;
  const startT = performance.now();

  const moverStarts = group.map(seg=>{
    if((seg.kind==='move'||seg.kind==='dribble')&&seg.fromIdx!=null)
      return {x:seg.sx, y:seg.sy};
    return null;
  });

  function animStep(now){
    if(!animRunning) return;
    if(animPaused){animFrame=requestAnimationFrame(animStep);return;}
    const t = Math.min((now-startT)/dur, 1);
    const ease = t<0.5 ? 2*t*t : 1-Math.pow(-2*t+2,2)/2;

    // Mover jugadoras
    group.forEach((seg,gi)=>{
      const ms=moverStarts[gi];
      if(!ms||seg.fromIdx==null) return;
      let np;
      if(seg.geom==='seg')       np=pointOnSegment(ms.x,ms.y,seg.tx,seg.ty,ease);
      else if(seg.geom==='quad') np=pointOnQuad(ms.x,ms.y,seg.cx,seg.cy,seg.x2,seg.y2,ease);
      else if(seg.geom==='path') np=pointOnPath([{x:ms.x,y:ms.y},...seg.path],ease);
      else np=ms;
      animPositions[seg.fromIdx].x=np.x;
      animPositions[seg.fromIdx].y=np.y;
      // Actualizar también el jugador original en tiempo real durante la interpolación
      const _mp=players[seg.fromIdx];
      if(_mp&&_mp.ghost){
        const _oi=players.findIndex(pl=>!pl.ghost&&pl.team===_mp.team&&pl.num===_mp.num);
        if(_oi>=0){ animPositions[_oi].x=np.x; animPositions[_oi].y=np.y; }
      }
    });

    // Dibujar
    drawField();

    // Grupos anteriores (trayectorias completadas — usar segmentos ya resueltos)
    for(let gi=0;gi<groupIdx;gi++){
      (resolvedGroups[gi]||[]).forEach(ps=>{
        ctx.save();ctx.globalAlpha=0.35;
        const col=arrowColor(ps.a.type),dsh=arrowDash(ps.a.type);
        if(ps.geom==='seg')       drawArrow(ps.sx,ps.sy,ps.tx,ps.ty,col,dsh,ps.a.type);
        else if(ps.geom==='quad') drawCurveArrow(ps.x1,ps.y1,ps.cx,ps.cy,ps.x2,ps.y2,col,dsh,ps.a.type);
        else if(ps.geom==='path') drawFreeArrow(ps.path,col,dsh,ps.a.type);
        ctx.restore();
      });
    }

    // Trayectorias del grupo actual
    group.forEach((seg,gi)=>{
      drawPartialTrail(seg,ease,arrowColor(seg.a.type),moverStarts[gi]);
    });

    // Jugadoras
    drawAnimPlayersGroup(group,moverStarts,animPositions);

    // Pelotas
    group.forEach((seg,gi)=>{
      let curBall=null;
      if(seg.kind==='ball'||seg.kind==='shot'){
        curBall=ballPos(seg,ease);
      } else if(seg.kind==='dribble'&&seg.fromIdx!=null){
        const jPos=animPositions[seg.fromIdx];
        const dir=ballDir(seg,ease,jPos);
        curBall={x:jPos.x+dir.x*14, y:jPos.y+dir.y*14};
      }
      if(curBall){
        const flash=seg.kind==='shot'&&t>0.85?(t-0.85)/0.15:0;
        drawBall(curBall.x,curBall.y,seg.a.type,flash);
      }
    });

    if(t<1){
      animFrame=requestAnimationFrame(animStep);
    } else {
      // Fijar posiciones finales
      group.forEach((seg,gi)=>{
        const ms=moverStarts[gi];
        if(ms&&seg.fromIdx!=null){
          let fp;
          if(seg.geom==='path'&&seg.path&&seg.path.length>0)
            fp={x:seg.path[seg.path.length-1].x, y:seg.path[seg.path.length-1].y};
          else if(seg.geom==='quad') fp={x:seg.x2, y:seg.y2};
          else fp={x:seg.tx, y:seg.ty};
          // Acumular fantasma usando team:num como clave (unifica original + ghosts)
          const _p=players[seg.fromIdx];
          const _key=_p?(_p.team+':'+_p.num):seg.fromIdx;
          const trail=ghostTrails.get(_key)||[];
          trail.push({x:ms.x, y:ms.y});
          ghostTrails.set(_key, trail);
          // Actualizar animPositions del fromIdx actual
          animPositions[seg.fromIdx].x=fp.x;
          animPositions[seg.fromIdx].y=fp.y;
          // SIEMPRE actualizar el jugador original (no-ghost) — es la fuente de verdad
          const _origIdx=players.findIndex(pl=>!pl.ghost&&pl.team===_p.team&&pl.num===_p.num);
          if(_origIdx>=0&&_origIdx!==seg.fromIdx){
            animPositions[_origIdx].x=fp.x;
            animPositions[_origIdx].y=fp.y;
          }
        }
        if(seg.ballOut){
          ballState={x:seg.tx,y:seg.ty};
          lastBallReceiver=seg.toIdx!=null?seg.toIdx:null;
        }
      });

          setTimeout(()=>runAutoGroup(autoGroups, groupIdx+1), ANIM_PAUSE_MS);
    }
  }
  animFrame=requestAnimationFrame(animStep);
}

function onAnimEnd(){
  animRunning=false;
  stopRecording();
  document.getElementById('btn-play').textContent='▶ Play';
  status('Animación completada — descargá el video');
  drawFinalFrame();
}

function drawFinalFrame(){
  // Cuadro final: flechas completas + fantasmas de estela + jugadoras en posición final
  drawField();

  // Todas las flechas usando segmentos resueltos (posiciones correctas de origen)
  resolvedGroups.forEach(grp=>{
    grp.forEach(ps=>{
      ctx.save();ctx.globalAlpha=0.4;
      const col=arrowColor(ps.a.type),dsh=arrowDash(ps.a.type);
      if(ps.geom==='seg')       drawArrow(ps.sx,ps.sy,ps.tx,ps.ty,col,dsh,ps.a.type);
      else if(ps.geom==='quad') drawCurveArrow(ps.x1,ps.y1,ps.cx,ps.cy,ps.x2,ps.y2,col,dsh,ps.a.type);
      else if(ps.geom==='path') drawFreeArrow(ps.path,col,dsh,ps.a.type);
      ctx.restore();
    });
  });

  // Flechas sin from (curvas/libres sin jugador origen) — fallback
  arrows.filter(a=>a.from==null).forEach((a,ai)=>{
    ctx.save();ctx.globalAlpha=0.4;
    const color=arrowColor(a.type),dash=arrowDash(a.type);
    if(a.kind==='curve'){
      const cfp=a.from!=null?resolvedPos(a.from,ai):null;
      const cx1=cfp?cfp.x:a.x1, cy1=cfp?cfp.y:a.y1;
      drawCurveArrow(cx1,cy1,a.cx,a.cy,a.x2,a.y2,color,dash,a.type);
    } else if(a.kind==='free'&&a.path){
      drawFreeArrow(a.path,color,dash,a.type);
    } else if(a.kind==='straight'&&a.from!=null){
      // Usar resolvedPos para obtener el origen correcto (último destino de movimiento)
      const pFrom=players[a.from];
      if(!pFrom){ctx.restore();return;}
      const fp=resolvedPos(a.from,ai);
      const r=pFrom.r||18;
      if(a.to!=null){
        // Destino: posición original del jugador destino (no animPositions,
        // que ya está en su posición final y puede causar flechas incorrectas)
        const tp=players[a.to];
        if(tp){
          const dist=Math.hypot(tp.x-fp.x,tp.y-fp.y)||1;
          if(dist>r+5)
            drawArrow(fp.x+(tp.x-fp.x)*r/dist,fp.y+(tp.y-fp.y)*r/dist,tp.x,tp.y,color,dash,a.type);
        }
      } else if(a.toX!=null){
        const dist=Math.hypot(a.toX-fp.x,a.toY-fp.y)||1;
        if(dist>5)
          drawArrow(fp.x,fp.y,a.toX,a.toY,color,dash,a.type);
      }
    }
    ctx.restore();
  });

  // Construir mapa team:num → posición final y estela completa
  // Un jugador puede tener múltiples índices en players[] (original + ghosts)
  // Todos comparten team:num — la posición final es la del último ghost animado
  const finalPosMap = new Map();   // key → {x,y}
  const trailMap = new Map();      // key → [{x,y},...]

  players.forEach((p,i)=>{
    const key = p.team+':'+p.num;
    const pos = animPositions[i]||{x:p.x,y:p.y};
    // La posición final es la del último índice procesado con ese key
    // (los ghosts tienen índices más altos = acciones más recientes)
    finalPosMap.set(key, pos);
    // Acumular estela — ghostTrails ahora usa team:num como clave
    const trail = ghostTrails.get(key)||ghostTrails.get(i)||[];
    if(trail.length>0){
      const existing = trailMap.get(key)||[];
      trailMap.set(key, [...existing, ...trail]);
    }
  });

  // Estela: todas las posiciones intermedias, muy atenuadas
  players.forEach((p,i)=>{
    if(p.ghost) return; // solo dibujar estela desde el original
    const key = p.team+':'+p.num;
    const finalPos = finalPosMap.get(key)||{x:p.x,y:p.y};
    const trail = trailMap.get(key)||[];
    if(!trail.length) return;
    trail.forEach((pt,ti)=>{
      const distToFinal = Math.hypot(pt.x-finalPos.x, pt.y-finalPos.y);
      if(distToFinal < p.r*1.5) return;
      const alpha = Math.max(0.03, 0.12-(trail.length-1-ti)*0.04);
      drawFinalPlayer(pt.x,pt.y,p,alpha,true);
    });
  });

  // Fantasmas estáticos del tablero (ghost:true dibujado por el tablero, no por acciones)
  // No dibujar — los ghosts de acción ya se manejan como estela

  // Sólidas al final — solo jugadores originales (no ghost), en posición final real
  players.forEach((p,i)=>{
    if(p.ghost) return;
    const key = p.team+':'+p.num;
    const pos = finalPosMap.get(key)||{x:p.x,y:p.y};
    ctx.save();
    ctx.shadowColor='rgba(0,0,0,0.55)';ctx.shadowBlur=10;ctx.shadowOffsetY=3;
    drawFinalPlayer(pos.x,pos.y,p,1,false);
    ctx.restore();
  });
}

function drawFinalPlayer(px,py,p,alpha,dashed){
  const isA=p.team==='A';
  const fillC=p.gk?(isA?'#fff9c4':'#c8f0c8'):(isA?'#e8f4ff':'#0d1f3c');
  const strokeC=p.gk?(isA?'#f9a825':'#2e7d32'):(isA?'#4a9fd4':'#1a2a4a');
  const textC=p.gk?(isA?'#5a3a00':'#1a3a1a'):(isA?'#1a3a5c':'#ffffff');
  ctx.save();ctx.globalAlpha=alpha;
  const lw=dashed?1:3;
  if(p.gk){
    const s=p.r*1.35;
    ctx.fillStyle=fillC;ctx.beginPath();ctx.roundRect(px-s/2,py-s/2,s,s,6);ctx.fill();
    ctx.strokeStyle=strokeC;ctx.lineWidth=lw;
    if(dashed)ctx.setLineDash([4,3]);
    ctx.beginPath();ctx.roundRect(px-s/2,py-s/2,s,s,6);ctx.stroke();ctx.setLineDash([]);
  } else {
    ctx.fillStyle=fillC;ctx.beginPath();ctx.arc(px,py,p.r,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle=strokeC;ctx.lineWidth=lw;
    if(dashed)ctx.setLineDash([4,3]);
    ctx.beginPath();ctx.arc(px,py,p.r,0,Math.PI*2);ctx.stroke();ctx.setLineDash([]);
  }
  ctx.save();ctx.translate(px,py);ctx.rotate(-Math.PI/2);
  ctx.fillStyle=textC;
  ctx.font=`bold ${dashed?12:15}px 'Barlow Condensed',sans-serif`;
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(p.num,0,0);
  ctx.restore();
  ctx.restore();
}

function playPauseAnim(){
  if(!animRunning){startAnimation();return;}
  animPaused=!animPaused;
  document.getElementById('btn-play').textContent=animPaused?'▶ Play':'⏸ Pausa';
}
function resetAnim(){
  cancelAnimationFrame(animFrame);clearTimeout(phaseTimer);
  animRunning=false;animPaused=false;
  document.getElementById('btn-play').textContent='▶ Play';
  stopRecording();draw();status('Animación reiniciada');
}
function stopAnimation(){
  resetAnim();
  document.getElementById('anim-bar').style.display='none';
  document.getElementById('dl-btn').style.display='none';
}
function setSpeed(s){
  // slow=2x, normal=1x, fast=0.5x (multiplicadores sobre ANIM_BASE_MS=2000ms)
  const mults={slow:2, normal:1, fast:0.5};
  animSpeedMult=mults[s]||1;
  // Reflejar en slider (100 = 1x, 200 = 0.5x … invertido: slider alto = más lento)
  const sliderVal=Math.round(100/animSpeedMult);
  document.getElementById('speed-slider').value=sliderVal;
  ['slow','normal','fast'].forEach(x=>document.getElementById('sp-'+x).classList.toggle('active',x===s));
}
function setSpeedSlider(val){
  // val: 25..400 donde 25=muy rápido (0.25x), 100=normal(1x), 400=muy lento(4x)
  animSpeedMult=parseInt(val)/100;
  // Quitar active de presets
  ['slow','normal','fast'].forEach(x=>document.getElementById('sp-'+x).classList.remove('active'));
}

// =============================================
// EXPORTACIÓN VIDEO (MediaRecorder)
// =============================================
function startRecording(){
  recordedChunks=[];downloadBlob=null;
  document.getElementById('dl-btn').style.display='none';
  try{
    const stream=canvas.captureStream(30);
    const mimeType=MediaRecorder.isTypeSupported('video/webm;codecs=vp9')?'video/webm;codecs=vp9':
                   MediaRecorder.isTypeSupported('video/webm')?'video/webm':'';
    if(!mimeType)return; // navegador no soporta
    mediaRecorder=new MediaRecorder(stream,{mimeType,videoBitsPerSecond:2500000});
    mediaRecorder.ondataavailable=e=>{if(e.data.size>0)recordedChunks.push(e.data);};
    mediaRecorder.onstop=()=>{
      downloadBlob=new Blob(recordedChunks,{type:mimeType});
      document.getElementById('dl-btn').style.display='block';
      document.getElementById('btn-export').style.display='';
    };
    mediaRecorder.start(100);
  }catch(err){console.warn('MediaRecorder no disponible:',err);}
}
function stopRecording(){
  if(mediaRecorder&&mediaRecorder.state!=='inactive'){
    mediaRecorder.stop();
  }
}
function exportVideo(){doDownload();}
function doDownload(){
  if(!downloadBlob)return;
  const url=URL.createObjectURL(downloadBlob);
  const a=document.createElement('a');a.href=url;
  a.download='tablero-tactico-'+(new Date().toISOString().slice(0,10))+'.webm';
  a.click();URL.revokeObjectURL(url);
}

// =============================================
// INIT
// =============================================
resizeCanvas();
draw();
updatePhaseBadge();
</script>
<script>
// Service Worker solo se registra desde HTTPS (GitHub Pages, no archivo local)
if('serviceWorker' in navigator && location.protocol==='https:'){
  const swCode=`
    const CACHE='tablero-tactico-v3';
    const FILES=['/'];
    self.addEventListener('install', e=>{
      e.waitUntil(
        caches.open(CACHE).then(c=>c.addAll(FILES)).then(()=>self.skipWaiting())
      );
    });
    self.addEventListener('activate', e=>{
      e.waitUntil(
        caches.keys().then(keys=>Promise.all(
          keys.filter(k=>k!==CACHE).map(k=>caches.delete(k))
        )).then(()=>self.clients.claim())
      );
    });
    self.addEventListener('fetch', e=>{
      e.respondWith(
        caches.match(e.request).then(r=>r||fetch(e.request).catch(()=>caches.match('/')))
      );
    });
  `;
  const blob=new Blob([swCode],{type:'application/javascript'});
  const swUrl=URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).catch(()=>{});
}

window.addEventListener('beforeinstallprompt', e=>{

  btn.onclick=()=>{

    deferredPrompt.userChoice.then(()=>{btn.remove();deferredPrompt=null;});
  };
  document.body.appendChild(btn);
  // Auto-ocultar después de 10 segundos
  setTimeout(()=>btn.remove(), 10000);
});
